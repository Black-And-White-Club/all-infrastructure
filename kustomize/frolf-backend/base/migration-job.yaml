apiVersion: batch/v1
kind: Job
metadata:
  name: frolf-bot-backend-migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 4
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: frolf-bot-backend-migrate
    spec:
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ocir-secret
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.35
          securityContext:
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until nc -z frolf-postgres-postgresql.frolf-bot.svc.cluster.local 5432; do
                echo "PostgreSQL is not ready yet. Waiting 5 seconds..."
                sleep 5
              done
              echo "PostgreSQL is ready!"
      containers:
        - name: migrate
          image: frolf-bot-backend
          imagePullPolicy: IfNotPresent
          args: ["migrate"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: JWT_SECRET
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
