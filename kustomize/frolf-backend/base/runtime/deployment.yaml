apiVersion: apps/v1
kind: Deployment
metadata:
  name: frolf-bot-backend
  labels:
    app.kubernetes.io/component: api
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: frolf-bot-backend
  template:
    metadata:
      labels:
        app: frolf-bot-backend
        app.kubernetes.io/component: api
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ocir-secret
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36.1@sha256:b9598f8c98e24d0ad42c1742c32516772c3aa2151011ebaf639089bd18c605b8
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until nc -z frolf-postgres-postgresql.frolf-bot.svc.cluster.local 5432; do
                echo "PostgreSQL is not ready yet. Waiting 5 seconds..."
                sleep 5
              done
              echo "PostgreSQL is ready!"

              echo "Waiting for NATS to be ready..."
              until nc -z frolf-nats.frolf-bot.svc.cluster.local 4222; do
                echo "NATS is not ready yet. Waiting 5 seconds..."
                sleep 5
              done
              echo "NATS is ready!"
      containers:
        - name: backend
          image: frolf-bot-backend
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
            - containerPort: 6060
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DATABASE_URL
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_NAME
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: POSTGRES_DSN
            - name: POSTGRES_MAX_OPEN_CONNS
              value: "25"
            - name: POSTGRES_MAX_IDLE_CONNS
              value: "25"
            - name: POSTGRES_CONN_MAX_LIFETIME
              value: "5m"
            - name: POSTGRES_CONN_MAX_IDLE_TIME
              value: "1m"
            - name: POSTGRES_STATEMENT_TIMEOUT
              value: "30s"
            - name: NATS_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: NATS_URL
            - name: ENV
              value: "production"
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            - name: CONFIG_FILE
              value: ""
            - name: AUTO_MIGRATE
              value: "false"
            - name: METRICS_ADDRESS
              value: "alloy.observability.svc.cluster.local:4317"
            - name: METRICS_ENABLED
              value: "true"
            - name: LOKI_URL
              value: "http://loki.observability.svc.cluster.local:3100"
            - name: TEMPO_ENDPOINT
              value: "alloy.observability.svc.cluster.local:4317"
            - name: TEMPO_INSECURE
              value: "true"
            - name: TEMPO_SAMPLE_RATE
              value: "0"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            - name: OTEL_SDK_DISABLED
              value: "false"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.observability.svc.cluster.local:4317"
            - name: OTLP_ENDPOINT
              value: "alloy.observability.svc.cluster.local:4317"
            - name: OTLP_TRANSPORT
              value: "grpc"
            - name: OTLP_INSECURE
              value: "true"
            - name: PPROF_ENABLED
              value: "true"
            - name: PPROF_ADDR
              value: ":6060"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: JWT_SECRET
            - name: TOKEN_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: TOKEN_ENCRYPTION_KEY
            - name: AUTH_CALLOUT_ENABLED
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AUTH_CALLOUT_ENABLED
            - name: AUTH_CALLOUT_SUBJECT
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AUTH_CALLOUT_SUBJECT
            - name: AUTH_CALLOUT_ISSUER_NKEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AUTH_CALLOUT_ISSUER_NKEY
            - name: AUTH_CALLOUT_SIGNING_NKEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AUTH_CALLOUT_SIGNING_NKEY
            - name: AUTH_CALLOUT_SERVER_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AUTH_CALLOUT_SERVER_PUBLIC_KEY
            - name: JWT_ISSUER
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: JWT_ISSUER
            - name: JWT_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: JWT_AUDIENCE
            - name: DISCORD_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DISCORD_OAUTH_CLIENT_ID
            - name: DISCORD_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DISCORD_OAUTH_CLIENT_SECRET
            - name: DISCORD_OAUTH_REDIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DISCORD_OAUTH_REDIRECT_URL
            - name: GOOGLE_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: GOOGLE_OAUTH_CLIENT_ID
            - name: GOOGLE_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: GOOGLE_OAUTH_CLIENT_SECRET
            - name: GOOGLE_OAUTH_REDIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: GOOGLE_OAUTH_REDIRECT_URL
            - name: PWA_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: PWA_BASE_URL
            - name: TRUSTED_PROXY_CIDRS
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: TRUSTED_PROXY_CIDRS
                  optional: true
            - name: OPS_HMAC_KEY_JSON
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: OPS_HMAC_KEY_JSON
            # Stripe collection rail — disabled by default. Flip to "true" only
            # at the coordinated cutover after the owner has sealed the five
            # STRIPE_* keys below into backend-secrets (see
            # cluster-resources/sealed-secrets/README.md#stripe-cutover):
            #   STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET,
            #   STRIPE_APPLICATION_FEE_CENTS, STRIPE_BILLING_WEBHOOK_SECRET,
            #   STRIPE_PLATFORM_SEASON_FEE_CENTS
            - name: STRIPE_ENABLED
              value: "false"
            # The three credential keys below use optional:true because they do
            # not yet exist in the sealed-backend-secrets payload. This keeps
            # pods schedulable before the owner seals them. STRIPE_ENABLED=false
            # means the backend ignores missing values until cutover.
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: STRIPE_SECRET_KEY
                  optional: true
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: STRIPE_WEBHOOK_SECRET
                  optional: true
            # STRIPE_APPLICATION_FEE_CENTS is a non-secret integer (≥0 cents
            # applied as a platform fee on each charge), but it is sealed with
            # the credential keys so that the entire feature is activated in a
            # single owner sealing action. optional:true for the same pre-seal
            # scheduling reason as the keys above.
            - name: STRIPE_APPLICATION_FEE_CENTS
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: STRIPE_APPLICATION_FEE_CENTS
                  optional: true
            # Platform billing webhook signing secret — signs events from the
            # PLATFORM Stripe account (invoice.paid, payment_failed, etc.).
            # Separate from STRIPE_WEBHOOK_SECRET which signs Connect events.
            # optional:true so pods schedule before the owner seals this value.
            - name: STRIPE_BILLING_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: STRIPE_BILLING_WEBHOOK_SECRET
                  optional: true
            # STRIPE_PLATFORM_SEASON_FEE_CENTS is a non-secret integer (≥0 cents
            # billed to each club per season via a platform invoice). Sealed here
            # — rather than set as a plain value — so the entire billing feature
            # activates in a single owner sealing action, parallel to the
            # STRIPE_APPLICATION_FEE_CENTS pattern above. optional:true for the
            # same pre-seal scheduling reason.
            - name: STRIPE_PLATFORM_SEASON_FEE_CENTS
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: STRIPE_PLATFORM_SEASON_FEE_CENTS
                  optional: true
            # Connect return/refresh URLs are the backend API landing points that
            # Stripe redirects to after Express onboarding completes or expires.
            # They are not secrets (confirmed: config.go comment "not secrets")
            # and do not change per-environment for this deployment.
            - name: STRIPE_CONNECT_RETURN_URL
              value: "https://frolf-bot.duckdns.org/api/payments/stripe/connect/return"
            - name: STRIPE_CONNECT_REFRESH_URL
              value: "https://frolf-bot.duckdns.org/api/payments/stripe/connect/refresh"
            # STRIPE_CONNECT_CLIENT_ID is the Standard OAuth client ID seam.
            # This deployment uses Express onboarding (no client_id required);
            # omitting the var is intentional — the backend treats empty string
            # as "not configured" and the Express flow does not read it.
          startupProbe:
            httpGet:
              path: /livez
              port: 8080
              scheme: HTTP
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
