apiVersion: batch/v1
kind: Job
metadata:
  name: frolf-backend-jetstream-ensure
  labels:
    app: frolf-backend-jetstream-ensure
    app.kubernetes.io/component: jetstream-ensure
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
    # Jobs run to completion — liveness/readiness probes are not applicable to batch workloads
    ignore-check.kube-linter.io/no-liveness-probe: "batch job, not a long-running service"
    ignore-check.kube-linter.io/no-readiness-probe: "batch job, not a long-running service"
spec:
  backoffLimit: 4
  # jetstream-ensure is idempotent (only widens subjects / raises retention, never narrows).
  # 300s is generous for a connectivity + stream-ensure pass.
  activeDeadlineSeconds: 300
  # Retain the Job (and its logs) for 10 minutes after completion.
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: frolf-backend-jetstream-ensure
        app.kubernetes.io/component: jetstream-ensure
    spec:
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ocir-secret
      initContainers:
        - name: wait-for-nats
          image: busybox:1.36.1@sha256:b9598f8c98e24d0ad42c1742c32516772c3aa2151011ebaf639089bd18c605b8
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for NATS to be ready..."
              until nc -z frolf-nats.frolf-bot.svc.cluster.local 4222; do
                echo "NATS is not ready yet. Waiting 5 seconds..."
                sleep 5
              done
              echo "NATS is ready!"
      containers:
        - name: frolf-bot-backend
          image: frolf-bot-backend
          imagePullPolicy: IfNotPresent
          args: ["jetstream-ensure"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: NATS_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: NATS_URL
            # DRY_RUN=true means jetstream-ensure will log what it WOULD change
            # but will NOT apply any stream mutations. Flip to "false" to enable
            # actual stream creation/widening on every PreSync.
            - name: DRY_RUN
              value: "true"
          resources:
            requests:
              memory: "64Mi"
              cpu: "1m"
            limits:
              memory: "256Mi"
              cpu: "250m"
