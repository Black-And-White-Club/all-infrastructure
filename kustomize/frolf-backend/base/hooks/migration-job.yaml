apiVersion: batch/v1
kind: Job
metadata:
  name: frolf-bot-backend-migrate
  labels:
    app: frolf-bot-backend-migrate
    app.kubernetes.io/component: migration
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
    # Jobs run to completion — liveness/readiness probes are not applicable to batch workloads
    ignore-check.kube-linter.io/no-liveness-probe: "batch job, not a long-running service"
    ignore-check.kube-linter.io/no-readiness-probe: "batch job, not a long-running service"
spec:
  # backoffLimit: assumes migrations are idempotent — the backend migration framework must track
  # applied migrations and skip already-applied ones so retries are safe.
  backoffLimit: 4
  # CONCURRENTLY index migrations run outside a transaction. If the
  # migrator is killed mid-CREATE INDEX CONCURRENTLY, the index is left
  # in INVALID state and future migration runs will skip it.
  #
  # Recovery: connect to the DB and run
  #   SELECT i.relname, c.relname AS table FROM pg_index x
  #   JOIN pg_class i ON i.oid = x.indexrelid
  #   JOIN pg_class c ON c.oid = x.indrelid
  #   WHERE NOT x.indisvalid;
  #   DROP INDEX CONCURRENTLY <invalid_index_name>;
  # then re-run the migration job. POSTGRES_MIGRATION_STATEMENT_TIMEOUT
  # caps any single statement; the 900s activeDeadlineSeconds caps the
  # whole job (all migrations).
  activeDeadlineSeconds: 900
  # ttlSecondsAfterFinished retains the Job (and its logs) for 10 minutes after completion.
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: frolf-bot-backend-migrate
        app.kubernetes.io/component: migration
    spec:
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ocir-secret
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36.1@sha256:b9598f8c98e24d0ad42c1742c32516772c3aa2151011ebaf639089bd18c605b8
          securityContext:
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until nc -z frolf-postgres-postgresql.frolf-bot.svc.cluster.local 5432; do
                echo "PostgreSQL is not ready yet. Waiting 5 seconds..."
                sleep 5
              done
              echo "PostgreSQL is ready!"
      containers:
        - name: migrate
          image: frolf-bot-backend
          imagePullPolicy: IfNotPresent
          args: ["migrate"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            # Per-statement cap so a stuck CREATE INDEX CONCURRENTLY can't burn
            # the whole activeDeadlineSeconds window. The backend reads this and
            # applies it via pgdriver.WithConnParams (bun's pgdriver does not
            # honor the libpq PGOPTIONS env var, which was a no-op here).
            - name: POSTGRES_MIGRATION_STATEMENT_TIMEOUT
              value: "10m"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: JWT_SECRET
            - name: NATS_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: NATS_URL
            # config.Validate() runs on every command path (including `migrate`)
            # and requires TOKEN_ENCRYPTION_KEY (32B, AES-256). _PREVIOUS is the
            # optional rotation slot — same validation if set.
            - name: TOKEN_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: TOKEN_ENCRYPTION_KEY
            - name: TOKEN_ENCRYPTION_KEY_PREVIOUS
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: TOKEN_ENCRYPTION_KEY_PREVIOUS
                  optional: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
