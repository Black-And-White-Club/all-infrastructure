apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  # Add env vars that are not in base: OTLP_LOGS_ENABLED (observability),
  # DISCORD_OAUTH_ACTIVITY_REDIRECT_URL and DISCORD_BOT_INSTALL_REDIRECT_URL
  # (standalone-PWA activity flow). All other env vars are defined in base.
  #
  # INVARIANT: OAuth redirect URLs MUST agree across the platform.
  #   DISCORD_OAUTH_ACTIVITY_REDIRECT_URL  ==  ${PWA_BASE_URL}/api/install/callback
  #   DISCORD_BOT_INSTALL_REDIRECT_URL     ==  https://frolf-bot.duckdns.org/api/install/callback
  # Both must also match the redirect URI(s) registered on the Discord
  # application. PWA_BASE_URL is sealed in `backend-secrets` (see
  # cluster-resources/sealed-secrets/generate-frolf-backend-secrets.sh
  # and base/runtime/deployment.yaml). A mismatch silently breaks the
  # OAuth install flow with NO backend-side error — Discord just
  # rejects the redirect and the user lands on a generic error page.
  - target:
      kind: Deployment
      name: frolf-bot-backend
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OTLP_LOGS_ENABLED
          value: "true"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: DISCORD_OAUTH_ACTIVITY_REDIRECT_URL
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: DISCORD_OAUTH_ACTIVITY_REDIRECT_URL
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: DISCORD_BOT_INSTALL_REDIRECT_URL
          value: "https://frolf-bot.duckdns.org/api/install/callback"
images:
  # Single source of truth for the backend image: rewrites the
  # `frolf-bot-backend` placeholder in base manifests AND carries the tag.
  # Image Updater (argocd/image-updaters/frolf-backend.yaml) targets this
  # entry via manifestTargets.kustomize.name=frolf-bot-backend, so automated
  # bumps land here. Do not split into two entries — that's how the
  # placeholder-rewrite and tag-bump rows drift apart.
  - name: frolf-bot-backend
    newName: us-ashburn-1.ocir.io/id2uwn5pyixh/frolf-bot/backend
    newTag: v1.0.269
  - name: us-ashburn-1.ocir.io/id2uwn5pyixh/frolf-bot/backend
    newTag: v1.0.279
