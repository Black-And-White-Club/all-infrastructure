apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
# Namespace to deploy into
namespace: frolf-bot
# Generate the config map for environment variables
configMapGenerator:
  - name: frolf-pwa-config
    literals:
      - PUBLIC_NATS_URL=wss://frolf-bot.duckdns.org/nats
      - PUBLIC_API_URL=https://frolf-bot.duckdns.org
      - PUBLIC_OTEL_ENDPOINT=https://frolf-bot.duckdns.org
      - PUBLIC_DEBUG=false
      - PUBLIC_API_HOST_ALLOWLIST=frolf-bot.duckdns.org
      - PRIVATE_API_HOST_ALLOWLIST=frolf-bot-backend.frolf-bot.svc.cluster.local
      - PRIVATE_API_URL=http://frolf-bot-backend.frolf-bot.svc.cluster.local
      # Mock-mode flags must be explicit "false" in production.
      # PUBLIC_USE_MOCK is consumed by client and SSR code; PRIVATE_ALLOW_MOCK_PROD
      # is a server-only diagnostic override that gates mock mode outside dev.
      - PUBLIC_USE_MOCK=false
      - PRIVATE_ALLOW_MOCK_PROD=false
# Image modification - ArgoCD Image Updater will patch this
images:
  # Single source of truth for the PWA image: rewrites the `frolf-bot-pwa`
  # placeholder in base manifests AND carries the tag. Image Updater
  # (argocd/image-updaters/frolf-bot-pwa.yaml) targets this entry via
  # manifestTargets.kustomize.name=frolf-bot-pwa. Do not split into two entries.
  - name: frolf-bot-pwa
    newName: us-ashburn-1.ocir.io/id2uwn5pyixh/frolf-bot-pwa
    newTag: v1.0.133
  - name: us-ashburn-1.ocir.io/id2uwn5pyixh/frolf-bot-pwa
    newTag: v1.0.137
