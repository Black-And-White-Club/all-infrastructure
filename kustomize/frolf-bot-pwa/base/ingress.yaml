apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frolf-bot-pwa
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://frolf-bot.duckdns.org"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
spec:
  ingressClassName: nginx
  rules:
    - host: frolf-bot.duckdns.org
      http:
        paths:
          # OTLP HTTP traces from browsers go through Alloy at `/v1`
          # (see charts/alloy/values.yaml). The previous `/v1/traces` rule
          # routing to tempo-distributor-external was removed: it overlapped
          # with Alloy's `/v1` prefix in a different namespace, making
          # routing non-deterministic, and skipped the Alloy enrichment
          # pipeline (cluster.name attributes, batch processing).
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frolf-bot-pwa
                port:
                  number: 80
  tls:
    - hosts:
        - frolf-bot.duckdns.org
      secretName: frolf-bot-pwa-tls
