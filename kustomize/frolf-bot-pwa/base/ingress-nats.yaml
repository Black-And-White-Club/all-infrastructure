apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frolf-nats-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # WebSocket upgrade for the browser NATS-WS handshake. The NATS WS
    # server already serves on `/`, so no rewrite is needed; adding one
    # breaks the upgrade.
    nginx.ingress.kubernetes.io/backend-protocol: "WS"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # Long-lived WebSocket connections — keep nginx from idling them out.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # CORS for the PWA origin opening the WS from the browser.
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://frolf-bot.duckdns.org"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: frolf-bot.duckdns.org
      http:
        paths:
          - path: /nats
            pathType: Prefix
            backend:
              service:
                name: frolf-nats
                port:
                  number: 9222
  # TLS is owned by kustomize/frolf-bot-pwa/base/ingress.yaml — all four
  # ingresses share the host `frolf-bot.duckdns.org`, and cert-manager
  # only needs one source of truth for the `frolf-bot-pwa-tls` secret.
  # nginx terminates TLS once and routes paths to each backend.
