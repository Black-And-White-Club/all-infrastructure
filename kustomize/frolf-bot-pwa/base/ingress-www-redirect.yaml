apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frolf-bot-pwa-www-redirect
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # No $request_uri: the admission webhook validates this value against a
    # plain-URL regex and denies nginx variables. www deep links land on the
    # homepage, which is fine — all generated links use the apex domain.
    nginx.ingress.kubernetes.io/permanent-redirect: https://aceflight.app
    nginx.ingress.kubernetes.io/permanent-redirect-code: "301"
spec:
  ingressClassName: nginx
  rules:
    - host: www.aceflight.app
      http:
        paths:
          # Backend is never actually reached — nginx short-circuits with the
          # permanent-redirect annotation above before proxying upstream.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frolf-bot-pwa
                port:
                  number: 80
  tls:
    - hosts:
        - www.aceflight.app
      secretName: frolf-bot-pwa-www-tls
