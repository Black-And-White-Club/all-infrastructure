apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frolf-bot-pwa-www-redirect
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/permanent-redirect: https://aceflight.app$request_uri
    nginx.ingress.kubernetes.io/permanent-redirect-code: "301"
spec:
  ingressClassName: nginx
  rules:
    - host: www.aceflight.app
      http:
        paths:
          # Backend is never actually reached — nginx short-circuits with the
          # permanent-redirect annotation above before proxying upstream.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frolf-bot-pwa
                port:
                  number: 80
  tls:
    - hosts:
        - www.aceflight.app
      secretName: frolf-bot-pwa-www-tls
