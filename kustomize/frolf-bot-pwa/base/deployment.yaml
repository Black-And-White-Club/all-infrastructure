apiVersion: apps/v1
kind: Deployment
metadata:
  name: frolf-bot-pwa
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: frolf-bot-pwa
  template:
    metadata:
      labels:
        app: frolf-bot-pwa
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir: {}
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: frolf-bot-pwa
          image: frolf-bot-pwa
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: BODY_SIZE_LIMIT
              value: "10M"
            - name: IDLE_TIMEOUT
              value: "75"
            - name: SHUTDOWN_TIMEOUT
              value: "30"
            - name: PRIVATE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: frolf-pwa-config
                  key: PRIVATE_API_URL
            - name: PRIVATE_OTEL_ENDPOINT
              value: "http://alloy.observability.svc.cluster.local:4318"
            - name: PUBLIC_NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: frolf-pwa-config
                  key: PUBLIC_NATS_URL
            - name: PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: frolf-pwa-config
                  key: PUBLIC_API_URL
            - name: PUBLIC_OTEL_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: frolf-pwa-config
                  key: PUBLIC_OTEL_ENDPOINT
            - name: PUBLIC_DEBUG
              valueFrom:
                configMapKeyRef:
                  name: frolf-pwa-config
                  key: PUBLIC_DEBUG
            - name: PUBLIC_API_HOST_ALLOWLIST
              valueFrom:
                configMapKeyRef:
                  name: frolf-pwa-config
                  key: PUBLIC_API_HOST_ALLOWLIST
            - name: PRIVATE_API_HOST_ALLOWLIST
              valueFrom:
                configMapKeyRef:
                  name: frolf-pwa-config
                  key: PRIVATE_API_HOST_ALLOWLIST
            # Mock-mode flags. PUBLIC_USE_MOCK is read by src/lib/config.ts
            # and src/lib/stores/init.svelte.ts. PRIVATE_ALLOW_MOCK_PROD is
            # a server-only diagnostic override read by
            # src/routes/+layout.server.ts. Both must be "false" in
            # production. Production overlay sets these via configMap to
            # keep the value explicit at the overlay level.
            - name: PUBLIC_USE_MOCK
              valueFrom:
                configMapKeyRef:
                  name: frolf-pwa-config
                  key: PUBLIC_USE_MOCK
            - name: PRIVATE_ALLOW_MOCK_PROD
              valueFrom:
                configMapKeyRef:
                  name: frolf-pwa-config
                  key: PRIVATE_ALLOW_MOCK_PROD
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            failureThreshold: 24
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
