apiVersion: apps/v1
kind: Deployment
metadata:
  name: frolf-bot-pwa
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: frolf-bot-pwa
  template:
    metadata:
      labels:
        app: frolf-bot-pwa
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir: {}
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: frolf-bot-pwa
          image: us-ashburn-1.ocir.io/id2uwn5pyixh/frolf-bot-pwa
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: BODY_SIZE_LIMIT
              value: "10M"
            - name: PRIVATE_API_URL
              value: "http://frolf-bot-backend.frolf-bot.svc.cluster.local"
            - name: PRIVATE_OTEL_ENDPOINT
              value: "http://alloy.observability.svc.cluster.local:4318"
            - name: PUBLIC_NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: frolf-pwa-config
                  key: PUBLIC_NATS_URL
            - name: PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: frolf-pwa-config
                  key: PUBLIC_API_URL
            - name: PUBLIC_OTEL_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: frolf-pwa-config
                  key: PUBLIC_OTEL_ENDPOINT
            - name: PUBLIC_DEBUG
              valueFrom:
                configMapKeyRef:
                  name: frolf-pwa-config
                  key: PUBLIC_DEBUG
            - name: PUBLIC_API_HOST_ALLOWLIST
              valueFrom:
                configMapKeyRef:
                  name: frolf-pwa-config
                  key: PUBLIC_API_HOST_ALLOWLIST
            - name: PRIVATE_API_HOST_ALLOWLIST
              valueFrom:
                configMapKeyRef:
                  name: frolf-pwa-config
                  key: PRIVATE_API_HOST_ALLOWLIST
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
