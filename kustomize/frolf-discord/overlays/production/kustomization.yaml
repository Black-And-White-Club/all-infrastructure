apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
images:
  - name: frolf-bot-discord
    newName: us-ashburn-1.ocir.io/id2uwn5pyixh/frolf-bot/discord
    newTag: v1.0.219
  - name: us-ashburn-1.ocir.io/id2uwn5pyixh/frolf-bot/discord
    newTag: v1.0.219
patches:
  # Add env vars that are not in base: OTLP_LOGS_ENABLED (observability).
  # All other env vars are defined in base — using op:replace on the entire
  # env array clobbered base-only keys (DISCORD_COMMAND_SYNC_DELAY_MS,
  # DISCORD_COMMAND_SYNC_WORKERS, DISCORD_COMMAND_SYNC_RETRY_MS, OTLP_INSECURE,
  # PPROF_ADDR). Use op:add per-var (not op:replace on the array) to avoid
  # this; the backend overlay uses the same pattern for the same reason.
  - target:
      kind: Deployment
      name: frolf-bot-discord
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OTLP_LOGS_ENABLED
          value: "true"
