apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frolf-bot-ops-ingress
  labels:
    app.kubernetes.io/component: ops-console
spec:
  podSelector:
    matchLabels:
      app: frolf-bot-ops
  policyTypes:
    - Ingress
  # The ops console authenticates partly via the Tailscale-User-Login header
  # injected by the operator's HTTPS Ingress proxy. That header is a trust
  # signal ONLY when the request originates from a Tailscale proxy pod —
  # otherwise any in-cluster pod could forge an identity. This NetworkPolicy
  # is the L3 trust boundary: ingress to the ops Service is restricted to
  # pods in the `tailscale` namespace (operator + its operator-managed proxy
  # StatefulSets), denying everything else.
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tailscale
      ports:
        - protocol: TCP
          port: 8080
  # TODO: scope egress (NATS 4222, Postgres 5432, SMTP 587/465, Alloy 4317/4318)
  # by adding `Egress` to policyTypes with explicit allow rules — mirror the
  # frolf-bot-backend-policy pattern in cluster-resources/networkpolicies/.
