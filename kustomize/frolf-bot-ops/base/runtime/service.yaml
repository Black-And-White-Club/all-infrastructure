apiVersion: v1
kind: Service
metadata:
  name: frolf-bot-ops
  labels:
    app.kubernetes.io/component: ops-console
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "ops.frolf-bot"
spec:
  selector:
    app: frolf-bot-ops
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer
  loadBalancerClass: tailscale
