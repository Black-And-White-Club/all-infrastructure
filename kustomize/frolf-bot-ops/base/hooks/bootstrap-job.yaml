apiVersion: batch/v1
kind: Job
metadata:
  name: frolf-bot-ops-bootstrap
  labels:
    app: frolf-bot-ops-bootstrap
    app.kubernetes.io/component: bootstrap
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
    # Jobs run to completion — liveness/readiness probes are not applicable to batch workloads
    ignore-check.kube-linter.io/no-liveness-probe: "batch job, not a long-running service"
    ignore-check.kube-linter.io/no-readiness-probe: "batch job, not a long-running service"
spec:
  backoffLimit: 4
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: frolf-bot-ops-bootstrap
        app.kubernetes.io/component: bootstrap
    spec:
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir: {}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36.1@sha256:b9598f8c98e24d0ad42c1742c32516772c3aa2151011ebaf639089bd18c605b8
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until nc -z frolf-postgres-postgresql.frolf-bot.svc.cluster.local 5432; do
                echo "PostgreSQL is not ready yet. Waiting 5 seconds..."
                sleep 5
              done
              echo "PostgreSQL is ready!"
      containers:
        - name: bootstrap
          image: postgres:17.4
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            # HOME points at writable /tmp so psql can resolve $HOME under
            # readOnlyRootFilesystem: true and runAsUser: 1000 (random UID
            # with no /etc/passwd entry).
            - name: HOME
              value: /tmp
            - name: PSQL_HISTORY
              value: /dev/null
            - name: PGHOST
              value: frolf-postgres-postgresql.frolf-bot.svc.cluster.local
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: postgres
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: frolf-postgres-secret
                  key: postgres-password
            - name: OPS_DB_URL
              valueFrom:
                secretKeyRef:
                  name: frolf-bot-ops-secrets
                  key: OPS_DB_URL
            # Optional — populated when ops needs read-only access to frolf_bot
            # for "prod views". If unset, the corresponding phase below is a no-op.
            - name: PROD_RO_DSN
              valueFrom:
                secretKeyRef:
                  name: frolf-bot-ops-secrets
                  key: PROD_RO_DSN
                  optional: true
          command: ["bash", "-eu", "-c"]
          args:
            - |
              # Parse role password from OPS_DB_URL literally. Sealed secret today
              # uses an alphanumeric password; if a URL-special char (% @ : /) is
              # ever introduced, swap this for a real urldecoder.
              APP_PW="$(printf '%s' "$OPS_DB_URL" | sed -nE 's|^postgres(ql)?://[^:]+:([^@]+)@.*|\2|p')"
              if [ -z "$APP_PW" ]; then
                echo "FATAL: failed to parse password from OPS_DB_URL" >&2
                exit 1
              fi

              # Phase 1 — connected to default 'postgres' DB. Role first so the
              # subsequent CREATE DATABASE can assign ownership atomically.
              # Inline the password into the SQL literal directly. We can't
              # use psql -v / :'name' interpolation because (a) it isn't
              # applied inside dollar-quoted bodies (rules out DO blocks)
              # and (b) we observed it being passed through literally in -c
              # mode too. Bash interpolation is reliable as long as the
              # password cannot break out of the SQL literal — we refuse to
              # proceed if it contains a single quote or backslash.
              case "$APP_PW" in
                *\'*|*\\*)
                  echo "FATAL: APP_PW contains a single quote or backslash; refusing to embed in SQL literal" >&2
                  exit 1
                  ;;
              esac
              if [ "$(psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='frolfops_app'")" = "1" ]; then
                psql -v ON_ERROR_STOP=1 -d postgres \
                  -c "ALTER ROLE frolfops_app LOGIN PASSWORD '$APP_PW'"
              else
                psql -v ON_ERROR_STOP=1 -d postgres \
                  -c "CREATE ROLE frolfops_app LOGIN PASSWORD '$APP_PW'"
              fi

              # CREATE DATABASE cannot run inside a transaction; gate manually.
              if [ "$(psql -tAc "SELECT 1 FROM pg_database WHERE datname='frolfops'")" != "1" ]; then
                psql -v ON_ERROR_STOP=1 -d postgres -c "CREATE DATABASE frolfops OWNER frolfops_app;"
              else
                psql -v ON_ERROR_STOP=1 -d postgres -c "ALTER DATABASE frolfops OWNER TO frolfops_app;"
              fi

              # Phase 2 — connected to 'frolfops'. Extensions need superuser;
              # PG15+ owns 'public' schema via pg_database_owner, so re-own it
              # explicitly to frolfops_app (the role that runs goose migrations).
              psql -v ON_ERROR_STOP=1 -d frolfops <<'SQL'
              CREATE EXTENSION IF NOT EXISTS pgcrypto;
              CREATE EXTENSION IF NOT EXISTS citext;
              ALTER SCHEMA public OWNER TO frolfops_app;
              GRANT ALL ON SCHEMA public TO frolfops_app;
              SQL

              # Phase 3 — read-only role against the main frolf_bot DB. Optional:
              # only runs when PROD_RO_DSN is populated. Aligns frolfops_ro's
              # password with the DSN (the role survives the postgres data dir
              # but its password does not match the sealed secret after a wipe)
              # and idempotently grants the read perms the ops console needs.
              if [ -n "${PROD_RO_DSN:-}" ]; then
                RO_PW="$(printf '%s' "$PROD_RO_DSN" | sed -nE 's|^postgres(ql)?://[^:]+:([^@]+)@.*|\2|p')"
                if [ -z "$RO_PW" ]; then
                  echo "FATAL: failed to parse password from PROD_RO_DSN" >&2
                  exit 1
                fi
                case "$RO_PW" in
                  *\'*|*\\*)
                    echo "FATAL: RO_PW contains a single quote or backslash; refusing to embed in SQL literal" >&2
                    exit 1
                    ;;
                esac
                if [ "$(psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='frolfops_ro'")" = "1" ]; then
                  psql -v ON_ERROR_STOP=1 -d postgres \
                    -c "ALTER ROLE frolfops_ro LOGIN PASSWORD '$RO_PW'"
                else
                  psql -v ON_ERROR_STOP=1 -d postgres \
                    -c "CREATE ROLE frolfops_ro LOGIN PASSWORD '$RO_PW'"
                fi
                # Grants on the frolf_bot DB. SELECT is granted on existing tables;
                # ALTER DEFAULT PRIVILEGES ensures future tables (created by the
                # backend migrator running as the postgres superuser) are also
                # readable. All commands idempotent. Multiple -c calls in one
                # psql invocation avoids a heredoc whose terminator would be
                # extra-indented inside this `if`/`fi` block (YAML block scalars
                # strip only the *common* leading whitespace).
                psql -v ON_ERROR_STOP=1 -d frolf_bot \
                  -c "GRANT CONNECT ON DATABASE frolf_bot TO frolfops_ro" \
                  -c "GRANT USAGE ON SCHEMA public TO frolfops_ro" \
                  -c "GRANT SELECT ON ALL TABLES IN SCHEMA public TO frolfops_ro" \
                  -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO frolfops_ro"
              else
                echo "PROD_RO_DSN not set; skipping frolfops_ro phase"
              fi

              echo "bootstrap complete"
