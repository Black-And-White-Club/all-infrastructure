name: CI — Validate Infrastructure

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Terraform: lint + security scan ────────────────────────────────────────
  terraform-lint:
    name: Terraform Lint & Security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: terraform init (backend=false — no remote state needed for lint)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: v0.55.1

      - name: tflint
        run: |
          tflint --init
          tflint --format=compact

      - name: Install tfsec
        run: |
          set -euo pipefail
          TFSEC_VERSION=v1.28.11
          TFSEC_SHA256=18e2f947a4f0ec74bf6db07245fc81f83930835ef1b5d51d2d5152a6548b5e45
          curl -fsSLo /usr/local/bin/tfsec \
            "https://github.com/aquasecurity/tfsec/releases/download/${TFSEC_VERSION}/tfsec-linux-amd64"
          echo "${TFSEC_SHA256}  /usr/local/bin/tfsec" | sha256sum -c -
          chmod +x /usr/local/bin/tfsec

      - name: tfsec
        run: tfsec . --no-colour

  # ── Helm: lint + schema validation ─────────────────────────────────────────
  helm-lint:
    name: Helm Lint & Schema
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Install kubeconform
        run: |
          set -euo pipefail
          KUBECONFORM_VERSION=v0.6.7
          KUBECONFORM_SHA256=95f14e87aa28c09d5941f11bd024c1d02fdc0303ccaa23f61cef67bc92619d73
          curl -fsSLo /tmp/kubeconform-linux-amd64.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          echo "${KUBECONFORM_SHA256}  /tmp/kubeconform-linux-amd64.tar.gz" | sha256sum -c -
          tar xzf /tmp/kubeconform-linux-amd64.tar.gz -C /usr/local/bin kubeconform
          chmod +x /usr/local/bin/kubeconform

      - name: Lint charts/
        run: |
          for d in charts/*/; do
            [ -d "$d" ] || continue
            # Skip dirs that are values-only (no Chart.yaml)
            [ -f "$d/Chart.yaml" ] || continue
            echo "── Linting $d"
            helm lint "$d"
            if [ -f "$d/values.yaml" ]; then
              helm template "test-release" "$d" -f "$d/values.yaml" \
                | kubeconform -schema-location default -strict -
            fi
          done

  # ── Kustomize: build + kube-linter ─────────────────────────────────────────
  kustomize-lint:
    name: Kustomize Render & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Migration script unit tests (dry-run safety)
        # Runs before kustomize/kubectl are installed — tests use mocked binaries via PATH and
        # fixture manifests only; no cluster access or real kustomize invocations required.
        run: bash scripts/tests/run.sh

      - name: Static manifest policy checks
        run: bash scripts/validate-runtime-manifest-policies.sh .

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.x"

      - name: Install kube-linter
        run: |
          set -euo pipefail
          KUBE_LINTER_VERSION=v0.7.6
          KUBE_LINTER_SHA256=cb6128997162b8b7e6962284313635643434421b4e9b4f86545af7a4976e0139
          curl -fsSLo /tmp/kube-linter-linux.tar.gz \
            "https://github.com/stackrox/kube-linter/releases/download/${KUBE_LINTER_VERSION}/kube-linter-linux.tar.gz"
          echo "${KUBE_LINTER_SHA256}  /tmp/kube-linter-linux.tar.gz" | sha256sum -c -
          tar xzf /tmp/kube-linter-linux.tar.gz -C /usr/local/bin kube-linter
          chmod +x /usr/local/bin/kube-linter

      - name: Build and lint each kustomize overlay
        run: |
          FAILED=0
          for overlay in kustomize/*/overlays/production; do
            [ -d "$overlay" ] || continue
            APP=$(echo "$overlay" | cut -d/ -f2)
            echo "── Building $APP"
            if ! kustomize build "$overlay" > /tmp/rendered-"$APP".yaml 2>&1; then
              echo "ERROR: kustomize build failed for $APP"
              cat /tmp/rendered-"$APP".yaml
              FAILED=1
              continue
            fi
            echo "── image mapping checks: $APP"
            bash scripts/validate-production-overlay-images.sh \
              "$overlay"/kustomization.yaml \
              /tmp/rendered-"$APP".yaml || FAILED=1
            echo "── kube-linter: $APP"
            kube-linter lint /tmp/rendered-"$APP".yaml \
              --config .kube-linter.yaml || FAILED=1

            if [ "$APP" = "frolf-backend" ]; then
              echo "── migration hook contract checks: $APP"
              bash scripts/validate-frolf-backend-migration-hook.sh \
                /tmp/rendered-"$APP".yaml || FAILED=1
            fi
          done
          exit $FAILED
