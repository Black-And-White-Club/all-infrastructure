# No resources-finalizer: intentionally omitted to prevent cascade deletion
# of production SealedSecret resources if this ArgoCD app is pruned.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: platform
  source:
    repoURL: https://github.com/Black-And-White-Club/all-infrastructure-secrets.git
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
