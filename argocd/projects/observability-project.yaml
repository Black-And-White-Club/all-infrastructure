apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: observability
  namespace: argocd
spec:
  description: Shared observability stack

  sourceRepos:
    - "https://github.com/Black-And-White-Club/all-infrastructure.git"
    - "https://grafana.github.io/helm-charts"
    - "https://prometheus-community.github.io/helm-charts"

  destinations:
    - namespace: "observability"
      server: "https://kubernetes.default.svc"
    - namespace: "kube-system"
      server: "https://kubernetes.default.svc"

  orphanedResources:
    # The observability and kube-system namespaces contain many namespace/system
    # generated resources shared across multiple apps, so orphan warnings are
    # mostly noise here.
    warn: false

  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Pod
    - group: ""
      kind: PersistentVolumeClaim
    - group: ""
      kind: Secret
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: "apps"
      kind: DaemonSet
    - group: "apps"
      kind: Deployment
    - group: "apps"
      kind: ReplicaSet
    - group: "apps"
      kind: StatefulSet
    - group: "networking.k8s.io"
      kind: Ingress
    - group: "policy"
      kind: PodDisruptionBudget
    - group: "rbac.authorization.k8s.io"
      kind: Role
    - group: "rbac.authorization.k8s.io"
      kind: RoleBinding
  clusterResourceWhitelist:
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
