apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: apps
  namespace: argocd
spec:
  description: User applications

  sourceRepos:
    - 'https://github.com/Black-And-White-Club/all-infrastructure.git'
    - 'https://charts.bitnami.com/bitnami'
    - 'https://nats-io.github.io/k8s/helm/charts/'

  destinations:
    - namespace: 'resume-app'
      server: 'https://kubernetes.default.svc'
    - namespace: 'resume-db'
      server: 'https://kubernetes.default.svc'
    - namespace: 'frolf-bot'
      server: 'https://kubernetes.default.svc'

  orphanedResources:
    warn: true

  namespaceResourceWhitelist:
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: PersistentVolumeClaim
    - group: ''
      kind: Secret
    - group: ''
      kind: Service
    - group: ''
      kind: ServiceAccount
    - group: 'apps'
      kind: Deployment
    - group: 'apps'
      kind: StatefulSet
    - group: 'batch'
      kind: CronJob
    - group: 'batch'
      kind: Job
    - group: 'networking.k8s.io'
      kind: Ingress
    - group: 'policy'
      kind: PodDisruptionBudget
    - group: 'rbac.authorization.k8s.io'
      kind: Role
    - group: 'rbac.authorization.k8s.io'
      kind: RoleBinding
