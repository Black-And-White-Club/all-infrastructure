apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: apps
  namespace: argocd
spec:
  description: User applications

  sourceRepos:
    - 'https://github.com/Black-And-White-Club/all-infrastructure.git'
    - 'https://charts.bitnami.com/bitnami'
    - 'https://nats-io.github.io/k8s/helm/charts/'

  destinations:
    - namespace: 'resume-app'
      server: 'https://kubernetes.default.svc'
    - namespace: 'resume-db'
      server: 'https://kubernetes.default.svc'
    - namespace: 'frolf-bot'
      server: 'https://kubernetes.default.svc'

  orphanedResources:
    warn: true
    # Shared application namespaces always include namespace-generated defaults
    # that are not owned by any Argo application.
    ignore:
      - group: ''
        kind: ConfigMap
        name: kube-root-ca.crt
      - group: ''
        kind: ServiceAccount
        name: default
      - group: ''
        kind: Secret
        name: frolf-bot-pwa-tls
      - group: ''
        kind: Secret
        name: nats-tls
      - group: ''
        kind: Secret
        name: resume-app-tls

  namespaceResourceWhitelist:
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Pod
    - group: ''
      kind: PersistentVolumeClaim
    - group: ''
      kind: Secret
    - group: ''
      kind: Service
    - group: ''
      kind: ServiceAccount
    - group: 'apps'
      kind: Deployment
    - group: 'apps'
      kind: ReplicaSet
    - group: 'apps'
      kind: StatefulSet
    - group: 'batch'
      kind: CronJob
    - group: 'batch'
      kind: Job
    - group: 'networking.k8s.io'
      kind: Ingress
    - group: 'networking.k8s.io'
      kind: NetworkPolicy
    - group: 'policy'
      kind: PodDisruptionBudget
    - group: 'rbac.authorization.k8s.io'
      kind: Role
    - group: 'rbac.authorization.k8s.io'
      kind: RoleBinding
