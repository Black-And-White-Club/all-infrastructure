apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
  # No resources-finalizer: tempo stores trace data on persistent volumes;
  # omitted so app deletion never cascades to stateful data.
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  revisionHistoryLimit: 3
  project: observability
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: tempo-distributed
      targetRevision: 1.61.3
      helm:
        releaseName: tempo
        valueFiles:
          - $values/charts/tempo/values.yaml
    - repoURL: https://github.com/Black-And-White-Club/all-infrastructure.git
      targetRevision: main
      path: charts/tempo
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
