apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  # No resources-finalizer: grafana uses a persistent volume (grafana-pv);
  # omitted so app deletion never cascades to stateful data.
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  revisionHistoryLimit: 3
  project: observability
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: grafana
      targetRevision: 10.5.15
      helm:
        releaseName: grafana
        valueFiles:
          - $values/charts/grafana/values.yaml
    - repoURL: https://github.com/Black-And-White-Club/all-infrastructure.git
      targetRevision: main
      path: charts/grafana
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: grafana
      namespace: observability
      jsonPointers:
        - /spec/template/metadata/annotations/checksum~1secret
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - PrunePropagationPolicy=foreground
      - ServerSideApply=true
