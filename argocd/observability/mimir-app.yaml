apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mimir
  namespace: argocd
  # No resources-finalizer: mimir stores metrics data on persistent volumes;
  # omitted so app deletion never cascades to stateful data.
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  revisionHistoryLimit: 3
  project: observability
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: mimir-distributed
      targetRevision: 6.1.0
      helm:
        releaseName: mimir
        valueFiles:
          - $values/charts/mimir/values.yaml
    - repoURL: https://github.com/Black-And-White-Club/all-infrastructure.git
      targetRevision: main
      path: charts/mimir
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
