apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frolf-postgres
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  revisionHistoryLimit: 3
  project: apps
  sources:
    - repoURL: https://charts.bitnami.com/bitnami
      chart: postgresql
      # PINNED: Do NOT bump this version without verifying the PostgreSQL major version stays the same.
      # Bitnami chart upgrades can bump the PG major version, which triggers initdb and wipes the database.
      # frolf-bot lost its entire DB this way when PR #10 upgraded the chart (16.x→17.x transition).
      targetRevision: 16.2.4
      helm:
        valueFiles:
          - $values/charts/postgres/frolf-values.yaml
    - repoURL: https://github.com/Black-And-White-Club/all-infrastructure.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: frolf-bot
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
