apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: resume-postgres
  namespace: argocd
  # No resources-finalizer: intentionally omitted to prevent cascade deletion
  # of the Postgres PVC (production data) if this ArgoCD app is accidentally
  # deleted (same policy as frolf-postgres).
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  revisionHistoryLimit: 3
  project: apps
  sources:
    - repoURL: https://charts.bitnami.com/bitnami
      chart: postgresql
      # PINNED: Do NOT bump this version without verifying the PostgreSQL major version stays the same.
      # Bitnami chart upgrades can bump the PG major version, which triggers initdb and wipes the database
      # (frolf-bot lost its entire DB this way — see apps/frolf-postgres.yaml).
      targetRevision: 18.8.0
      helm:
        valueFiles:
          - $values/charts/postgres/resume-values.yaml
    - repoURL: https://github.com/Black-And-White-Club/all-infrastructure.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: resume-db
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
