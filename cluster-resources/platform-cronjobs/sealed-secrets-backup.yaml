apiVersion: v1
kind: ServiceAccount
metadata:
  name: sealed-secrets-backup
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sealed-secrets-backup
  namespace: kube-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sealed-secrets-backup
  namespace: kube-system
subjects:
  - kind: ServiceAccount
    name: sealed-secrets-backup
    namespace: kube-system
roleRef:
  kind: Role
  name: sealed-secrets-backup
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: sealed-secrets-backup
  namespace: kube-system
spec:
  schedule: "0 2 * * 0"   # Sunday 2 AM UTC weekly
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: sealed-secrets-backup
          volumes:
            - name: backup
              emptyDir: {}
          initContainers:
            - name: dump
              image: bitnamilegacy/kubectl:1.31.4-debian-12-r0
              command:
                - sh
                - -c
                - |
                  kubectl get secret -n kube-system \
                    -l sealedsecrets.bitnami.com/sealed-secrets-key \
                    -o yaml > /backup/sealed-secrets-key.yaml
              volumeMounts:
                - name: backup
                  mountPath: /backup
          containers:
            - name: upload
              image: amazon/aws-cli:2.22.35
              command:
                - sh
                - -c
                - |
                  aws s3 cp /backup/sealed-secrets-key.yaml \
                    "s3://${BUCKET_NAME}/sealed-secrets-key-$(date +%Y-%m-%d).yaml" \
                    --endpoint-url "$S3_ENDPOINT" --region us-ashburn-1
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: sealed-secrets-backup-creds
                      key: access-key
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: sealed-secrets-backup-creds
                      key: secret-key
                - name: BUCKET_NAME
                  valueFrom:
                    secretKeyRef:
                      name: sealed-secrets-backup-creds
                      key: bucket-name
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: sealed-secrets-backup-creds
                      key: s3-endpoint
              volumeMounts:
                - name: backup
                  mountPath: /backup
