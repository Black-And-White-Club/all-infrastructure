apiVersion: v1
kind: PersistentVolume
metadata:
  name: grafana-pv
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: grafana
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  volumeMode: Filesystem
  local:
    path: /mnt/data/grafana
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                # `worker-1` is the OCI cluster's node hostname (matches
                # pv-loki-local.yaml, pv-tempo-ingester-wal.yaml,
                # pv-resume-postgres-local.yaml). Confirm with:
                #   kubectl get nodes -o wide
                # TODO: migrate to a dynamic `oci-block-storage` PVC to
                # remove the manual node pin (see docs/ARCHITECTURE.md
                # storage section).
                - worker-1
