# OCI Volume Provisioner config using Instance Principals.
# Public-safe template only. Replace the placeholder compartment OCID from a
# private source before reconciling this manifest against a live cluster.
apiVersion: v1
kind: Secret
metadata:
  name: oci-volume-provisioner
  namespace: kube-system
type: Opaque
stringData:
  config.yaml: |
    auth:
      useInstancePrincipals: true
    compartment: ocid1.compartment.oc1..<replace-in-private-source>
