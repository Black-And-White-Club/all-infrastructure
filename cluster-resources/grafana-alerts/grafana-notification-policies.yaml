apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alert-notification-policies
  namespace: observability
  labels:
    grafana_alert: "1"
data:
  notification-policies.yaml: |
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: discord
        group_by: [alertname]
        # Severity-tiered re-notification: criticals nag hourly until resolved,
        # warnings twice a day. Both still land in the same Discord channel —
        # the tiers only control repeat cadence, not destination.
        routes:
          - receiver: discord
            object_matchers:
              - [severity, =, critical]
            repeat_interval: 1h
          - receiver: discord
            object_matchers:
              - [severity, =, warning]
            repeat_interval: 12h
        repeat_interval: 4h
