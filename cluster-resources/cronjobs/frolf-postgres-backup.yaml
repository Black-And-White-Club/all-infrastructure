apiVersion: batch/v1
kind: CronJob
metadata:
  name: frolf-postgres-backup
  namespace: frolf-bot
spec:
  schedule: "0 3 * * *"   # 3 AM UTC daily
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          volumes:
            - name: backup
              emptyDir: {}
          initContainers:
            - name: dump
              image: postgres:17.4
              command:
                - sh
                - -c
                - pg_dump "$DATABASE_URL" | gzip > /backup/frolf-bot.sql.gz
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: frolf-backend-secrets
                      key: DATABASE_URL
              volumeMounts:
                - name: backup
                  mountPath: /backup
          containers:
            - name: upload
              image: amazon/aws-cli:2.22.35
              command:
                - sh
                - -c
                - |
                  aws s3 cp /backup/frolf-bot.sql.gz \
                    "s3://${BUCKET_NAME}/frolf-bot-$(date +%Y-%m-%d).sql.gz" \
                    --endpoint-url "$S3_ENDPOINT" \
                    --region us-ashburn-1
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: frolf-postgres-backup-creds
                      key: access-key
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: frolf-postgres-backup-creds
                      key: secret-key
                - name: BUCKET_NAME
                  valueFrom:
                    secretKeyRef:
                      name: frolf-postgres-backup-creds
                      key: bucket-name
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: frolf-postgres-backup-creds
                      key: s3-endpoint
              volumeMounts:
                - name: backup
                  mountPath: /backup
