apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-frolf-db
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  frolf-bot-db.json: |
    {
      "id": null,
      "uid": "frolf-db",
      "title": "Frolf Bot — Database Performance",
      "description": "Query latency by operation and table, connection pool utilization, error rates",
      "tags": ["frolf-bot", "database"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "db_operation",
            "label": "Operation",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "mimir" },
            "query": "label_values(traces_spanmetrics_duration_seconds_count{service_name=\"frolf-bot\", db_system=\"postgresql\"}, db_operation)",
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "refresh": 2,
            "sort": 1
          },
          {
            "name": "db_table",
            "label": "Table",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "mimir" },
            "query": "label_values(traces_spanmetrics_duration_seconds_count{service_name=\"frolf-bot\", db_system=\"postgresql\"}, db_sql_table)",
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "refresh": 2,
            "sort": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Connection Pool — Open / Idle / Used",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "expr": "frolf_bot_db_connection_pool{service_name=\"frolf-bot\"}",
              "legendFormat": "{{state}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2 }
            }
          }
        },
        {
          "id": 2,
          "title": "Query Rate by Operation",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "expr": "sum by (db_operation) (rate(traces_spanmetrics_duration_seconds_count{service_name=\"frolf-bot\", db_system=\"postgresql\", db_operation=~\"$db_operation\"}[5m]))",
              "legendFormat": "{{db_operation}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "lineWidth": 2 }
            }
          }
        },
        {
          "id": 3,
          "title": "Query Latency p95 by Table",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (db_sql_table, le) (rate(traces_spanmetrics_duration_seconds_bucket{service_name=\"frolf-bot\", db_system=\"postgresql\", db_sql_table=~\"$db_table\"}[5m])))",
              "legendFormat": "p95 {{db_sql_table}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2 }
            }
          }
        },
        {
          "id": 4,
          "title": "Slow Query Tail (p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by (db_sql_table, le) (rate(traces_spanmetrics_duration_seconds_bucket{service_name=\"frolf-bot\", db_system=\"postgresql\"}[5m])))",
              "legendFormat": "p99 {{db_sql_table}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2 }
            }
          }
        },
        {
          "id": 5,
          "title": "Statement Timeout Errors",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "expr": "sum by (caller) (rate(frolf_bot_db_postgres_statement_timeout_total{job=\"frolf-bot\"}[5m]))",
              "legendFormat": "Timeout {{caller}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": { "fixedColor": "orange", "mode": "fixed" },
              "custom": { "lineWidth": 2 }
            }
          }
        }
      ]
    }
