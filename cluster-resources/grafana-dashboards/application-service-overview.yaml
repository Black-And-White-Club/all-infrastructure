apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-application-service-overview
  namespace: observability
  labels:
    grafana_dashboard: "1"
# NOTE: panels apply Prometheus "job" values to the Loki "service_name" label.
# This holds only while job == service.name == service_name (no
# service.namespace set anywhere) — introducing service.namespace would prefix
# the Prometheus job and silently break the cross-source match.
data:
  application-service-overview.json: |
    {
      "id": null,
      "uid": "frolf-service-overview",
      "title": "Application Service Overview",
      "description": "Cross-signal RED metrics, errors, and logs for product services",
      "tags": ["applications", "logs", "metrics", "traces"],
      "timezone": "browser",
      "schemaVersion": 42,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "links": [
        { "title": "Metrics Drilldown", "type": "link", "url": "/a/grafana-metricsdrilldown-app/drilldown", "targetBlank": false },
        { "title": "Logs Drilldown", "type": "link", "url": "/a/grafana-lokiexplore-app/explore", "targetBlank": false },
        { "title": "Trace Drilldown", "type": "link", "url": "/a/grafana-exploretraces-app/explore", "targetBlank": false }
      ],
      "templating": {
        "list": [
          {
            "name": "service", "label": "Service", "type": "query",
            "datasource": { "type": "prometheus", "uid": "mimir" },
            "query": { "query": "label_values({__name__=~\"go_goroutine_count|http_server_request_duration_seconds_count\"}, job)", "refId": "service" },
            "includeAll": true, "allValue": ".*", "multi": true, "refresh": 2, "sort": 1
          },
          {
            "name": "environment", "label": "Environment", "type": "query",
            "datasource": { "type": "prometheus", "uid": "mimir" },
            "query": { "query": "label_values({__name__=~\"go_goroutine_count|http_server_request_duration_seconds_count\",job=~\"$service\"}, environment)", "refId": "environment" },
            "includeAll": true, "allValue": ".*", "multi": true, "refresh": 2, "sort": 1
          },
          {
            "name": "namespace", "label": "Namespace", "type": "query",
            "datasource": { "type": "prometheus", "uid": "mimir" },
            "query": { "query": "label_values({__name__=~\"go_goroutine_count|http_server_request_duration_seconds_count\",job=~\"$service\",environment=~\"$environment\"}, namespace)", "refId": "namespace" },
            "includeAll": true, "allValue": ".*", "multi": true, "refresh": 2, "sort": 1
          },
          {
            "name": "workload", "label": "Workload", "type": "query",
            "datasource": { "type": "prometheus", "uid": "mimir" },
            "query": { "query": "label_values({__name__=~\"go_goroutine_count|http_server_request_duration_seconds_count\",job=~\"$service\",environment=~\"$environment\",namespace=~\"$namespace\"}, workload)", "refId": "workload" },
            "includeAll": true, "allValue": ".*", "multi": true, "refresh": 2, "sort": 1
          },
          {
            "name": "pod", "label": "Pod", "type": "query",
            "datasource": { "type": "prometheus", "uid": "mimir" },
            "query": { "query": "label_values({__name__=~\"go_goroutine_count|http_server_request_duration_seconds_count\",job=~\"$service\",environment=~\"$environment\",namespace=~\"$namespace\",workload=~\"$workload\"}, pod)", "refId": "pod" },
            "includeAll": true, "allValue": ".*", "multi": true, "refresh": 2, "sort": 1
          },
          {
            "name": "surface", "label": "PWA Surface", "type": "query",
            "datasource": { "type": "prometheus", "uid": "mimir" },
            "query": { "query": "label_values(http_server_request_duration_seconds_count{job=~\"$service\"}, app_surface)", "refId": "surface" },
            "includeAll": true, "allValue": ".*", "multi": true, "refresh": 2, "sort": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1, "title": "Request Rate", "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [{
            "expr": "sum by (job) (rate(http_server_request_duration_seconds_count{job=~\"$service\",environment=~\"$environment\",namespace=~\"$namespace\",workload=~\"$workload\",pod=~\"$pod\",app_surface=~\"$surface\"}[$__rate_interval]))",
            "legendFormat": "{{job}}", "refId": "A"
          }],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 2, "title": "5xx Error Rate", "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [{
            "expr": "sum by (job) (rate(http_server_request_duration_seconds_count{job=~\"$service\",environment=~\"$environment\",namespace=~\"$namespace\",workload=~\"$workload\",pod=~\"$pod\",app_surface=~\"$surface\",http_response_status_code=~\"5..\"}[$__rate_interval]))",
            "legendFormat": "{{job}}", "refId": "A"
          }],
          "fieldConfig": { "defaults": { "unit": "reqps", "color": { "mode": "fixed", "fixedColor": "red" } } }
        },
        {
          "id": 3, "title": "p95 Request Latency", "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [{
            "expr": "histogram_quantile(0.95, sum by (job, le) (rate(http_server_request_duration_seconds_bucket{job=~\"$service\",environment=~\"$environment\",namespace=~\"$namespace\",workload=~\"$workload\",pod=~\"$pod\",app_surface=~\"$surface\"}[$__rate_interval])))",
            "legendFormat": "{{job}}", "refId": "A"
          }],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 4, "title": "Application Logs", "type": "logs",
          "gridPos": { "h": 12, "w": 16, "x": 0, "y": 8 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [{
            "expr": "{service_name=~\"$service\",environment=~\"$environment\",namespace=~\"$namespace\",workload=~\"$workload\",pod=~\"$pod\",app_surface=~\"$surface\"}",
            "refId": "A"
          }],
          "options": { "showTime": true, "wrapLogMessage": true, "sortOrder": "Descending" }
        },
        {
          "id": 5, "title": "Error Logs", "type": "logs",
          "gridPos": { "h": 12, "w": 8, "x": 16, "y": 8 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [{
            "expr": "{service_name=~\"$service\",environment=~\"$environment\",namespace=~\"$namespace\",workload=~\"$workload\",pod=~\"$pod\",app_surface=~\"$surface\",level=~\"error|fatal\"}",
            "refId": "A"
          }],
          "options": { "showTime": true, "wrapLogMessage": true, "sortOrder": "Descending" }
        }
      ]
    }
