apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-finops
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  finops.json: |
    {
      "id": null,
      "uid": "frolf-finops",
      "title": "Frolf Bot — FinOps",
      "description": "Club-level activity costs, unit economics, and infrastructure usage for frolf-bot",
      "tags": ["frolf-bot", "finops"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "5m",
      "time": { "from": "now-30d", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "club_id",
            "label": "Club",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "mimir" },
            "query": "label_values(round_created_total{job=\"frolf-bot\"}, club_id)",
            "includeAll": true,
            "allValue": ".*",
            "multi": false,
            "refresh": 2,
            "sort": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Activity Summary",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "collapsed": false
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Rounds Created (30d)",
          "description": "Total rounds started across all clubs in the last 30 days",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "options": {
            "reduceOptions": { "calcs": ["sum"] },
            "orientation": "horizontal",
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "blue" },
              "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] }
            }
          },
          "targets": [
            {
              "expr": "sum(increase(round_created_total{job=\"frolf-bot\", club_id=~\"$club_id\"}[30d]))",
              "legendFormat": "Rounds Created",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Rounds Finalized (30d)",
          "description": "Rounds that completed and had scores processed",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "options": {
            "reduceOptions": { "calcs": ["sum"] },
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "green" },
              "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            }
          },
          "targets": [
            {
              "expr": "sum(increase(round_finalized_total{job=\"frolf-bot\", club_id=~\"$club_id\"}[30d]))",
              "legendFormat": "Rounds Finalized",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Active Clubs (30d)",
          "description": "Clubs that created at least one round in the last 30 days",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "purple" },
              "unit": "short"
            }
          },
          "targets": [
            {
              "expr": "count(sum by (club_id) (increase(round_created_total{job=\"frolf-bot\"}[30d])) > 0)",
              "legendFormat": "Active Clubs",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Score Processing Success Rate (30d)",
          "description": "Percentage of score processing attempts that succeeded",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.9 },
                  { "color": "green", "value": 0.98 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(increase(score_processing_success_total{job=\"frolf-bot\", club_id=~\"$club_id\"}[30d])) / clamp_min(sum(increase(score_processing_attempts_total{job=\"frolf-bot\"}[30d])), 1)",
              "legendFormat": "Success Rate",
              "refId": "A"
            }
          ]
        },
        {
          "id": 10,
          "type": "row",
          "title": "Club-Level Activity",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "collapsed": false
        },
        {
          "id": 11,
          "type": "bargauge",
          "title": "Rounds Created per Club (30d)",
          "description": "Total rounds started, broken out by club_id. Higher = more active / higher infrastructure demand.",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "options": {
            "reduceOptions": { "calcs": ["sum"] },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "showUnfilled": true
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] }
            }
          },
          "targets": [
            {
              "expr": "sum by (club_id) (increase(round_created_total{job=\"frolf-bot\", club_id!=\"\"}[30d]))",
              "legendFormat": "{{club_id}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 12,
          "type": "bargauge",
          "title": "Rounds Finalized per Club (30d)",
          "description": "Finalized rounds (with score processing) per club",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "options": {
            "reduceOptions": { "calcs": ["sum"] },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "showUnfilled": true
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "short"
            }
          },
          "targets": [
            {
              "expr": "sum by (club_id) (increase(round_finalized_total{job=\"frolf-bot\", club_id!=\"\"}[30d]))",
              "legendFormat": "{{club_id}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "Round Activity Over Time (by Club)",
          "description": "Daily rate of rounds created — useful for spotting usage spikes that drive infra cost",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 14 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["sum", "max"] }
          },
          "fieldConfig": {
            "defaults": {
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "unit": "short"
            }
          },
          "targets": [
            {
              "expr": "sum by (club_id) (increase(round_created_total{job=\"frolf-bot\", club_id=~\"$club_id\", club_id!=\"\"}[$__rate_interval]))",
              "legendFormat": "created — {{club_id}}",
              "refId": "A"
            },
            {
              "expr": "sum by (club_id) (increase(round_finalized_total{job=\"frolf-bot\", club_id=~\"$club_id\", club_id!=\"\"}[$__rate_interval]))",
              "legendFormat": "finalized — {{club_id}}",
              "refId": "B"
            }
          ]
        },
        {
          "id": 20,
          "type": "row",
          "title": "Score Processing",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 22 },
          "collapsed": false
        },
        {
          "id": 21,
          "type": "timeseries",
          "title": "Score Processing Success vs Failure (by Club)",
          "gridPos": { "h": 8, "w": 16, "x": 0, "y": 23 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["sum"] }
          },
          "fieldConfig": {
            "defaults": { "unit": "short", "custom": { "lineWidth": 2 } },
            "overrides": [
              {
                "matcher": { "id": "byRegexp", "options": ".*failure.*" },
                "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }]
              }
            ]
          },
          "targets": [
            {
              "expr": "sum by (club_id) (increase(score_processing_success_total{job=\"frolf-bot\", club_id=~\"$club_id\", club_id!=\"\"}[$__rate_interval]))",
              "legendFormat": "success — {{club_id}}",
              "refId": "A"
            },
            {
              "expr": "sum by (club_id) (increase(score_processing_failure_total{job=\"frolf-bot\", club_id=~\"$club_id\", club_id!=\"\"}[$__rate_interval]))",
              "legendFormat": "failure — {{club_id}}",
              "refId": "B"
            }
          ]
        },
        {
          "id": 22,
          "type": "bargauge",
          "title": "Score Corrections per Club (30d)",
          "description": "Admin score corrections — indicates data quality / rework cost",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 23 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "options": {
            "reduceOptions": { "calcs": ["sum"] },
            "orientation": "horizontal",
            "displayMode": "basic"
          },
          "fieldConfig": {
            "defaults": { "unit": "short", "color": { "mode": "fixed", "fixedColor": "orange" } }
          },
          "targets": [
            {
              "expr": "sum by (club_id) (increase(score_correction_success_total{job=\"frolf-bot\", club_id!=\"\"}[30d]))",
              "legendFormat": "{{club_id}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 30,
          "type": "row",
          "title": "Infrastructure Cost Proxy (frolf-bot namespace)",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 31 },
          "collapsed": false
        },
        {
          "id": 31,
          "type": "timeseries",
          "title": "CPU Usage by Pod",
          "description": "Actual CPU consumption for frolf-bot pods. Primary driver of infrastructure cost.",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 32 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
          },
          "fieldConfig": {
            "defaults": { "unit": "cores", "custom": { "lineWidth": 2, "fillOpacity": 10 } }
          },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"frolf-bot\", container!=\"\", container!=\"POD\"}[$__rate_interval]))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 32,
          "type": "timeseries",
          "title": "Memory Usage by Pod",
          "description": "Working set memory for frolf-bot pods.",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 32 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
          },
          "fieldConfig": {
            "defaults": { "unit": "bytes", "custom": { "lineWidth": 2, "fillOpacity": 10 } }
          },
          "targets": [
            {
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"frolf-bot\", container!=\"\", container!=\"POD\"})",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 33,
          "type": "stat",
          "title": "CPU Request Utilization",
          "description": "Actual usage vs requested CPU — low = over-provisioned (cost waste), high = under-provisioned (risk)",
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 40 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "area"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "green", "value": 0.4 },
                  { "color": "yellow", "value": 0.75 },
                  { "color": "red", "value": 0.9 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"frolf-bot\", container!=\"\", container!=\"POD\"}[5m])) / sum(kube_pod_container_resource_requests{namespace=\"frolf-bot\", resource=\"cpu\"})",
              "legendFormat": "CPU Utilization",
              "refId": "A"
            }
          ]
        },
        {
          "id": 34,
          "type": "stat",
          "title": "Memory Request Utilization",
          "description": "Actual memory usage vs requested — helps right-size pods",
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 40 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "area"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "green", "value": 0.4 },
                  { "color": "yellow", "value": 0.75 },
                  { "color": "red", "value": 0.9 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"frolf-bot\", container!=\"\", container!=\"POD\"}) / sum(kube_pod_container_resource_requests{namespace=\"frolf-bot\", resource=\"memory\"})",
              "legendFormat": "Memory Utilization",
              "refId": "A"
            }
          ]
        },
        {
          "id": 35,
          "type": "stat",
          "title": "Pod Restarts (24h)",
          "description": "Container restarts in frolf-bot namespace over last 24h — stability indicator",
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 40 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"frolf-bot\"}[24h]))",
              "legendFormat": "Restarts",
              "refId": "A"
            }
          ]
        },
        {
          "id": 36,
          "type": "table",
          "title": "Resource Requests vs Limits (frolf-bot pods)",
          "description": "Right-sizing reference — CPU/memory requests and limits per container",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 44 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "options": { "sortBy": [{ "displayName": "CPU Request", "desc": true }] },
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": [
              { "matcher": { "id": "byRegexp", "options": ".*CPU.*" }, "properties": [{ "id": "unit", "value": "cores" }] },
              { "matcher": { "id": "byRegexp", "options": ".*Memory.*" }, "properties": [{ "id": "unit", "value": "bytes" }] }
            ]
          },
          "targets": [
            {
              "expr": "kube_pod_container_resource_requests{namespace=\"frolf-bot\", resource=\"cpu\"}",
              "legendFormat": "CPU Request — {{container}}",
              "refId": "A",
              "instant": true
            },
            {
              "expr": "kube_pod_container_resource_limits{namespace=\"frolf-bot\", resource=\"cpu\"}",
              "legendFormat": "CPU Limit — {{container}}",
              "refId": "B",
              "instant": true
            },
            {
              "expr": "kube_pod_container_resource_requests{namespace=\"frolf-bot\", resource=\"memory\"}",
              "legendFormat": "Memory Request — {{container}}",
              "refId": "C",
              "instant": true
            },
            {
              "expr": "kube_pod_container_resource_limits{namespace=\"frolf-bot\", resource=\"memory\"}",
              "legendFormat": "Memory Limit — {{container}}",
              "refId": "D",
              "instant": true
            }
          ]
        },
        {
          "id": 40,
          "type": "row",
          "title": "Unit Economics",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 52 },
          "collapsed": false
        },
        {
          "id": 41,
          "type": "timeseries",
          "title": "Rounds per CPU-Core-Hour",
          "description": "Unit economics: how many rounds are processed per unit of CPU. Higher = more efficient. Tracks infra cost per unit of value delivered.",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 53 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "options": {
            "tooltip": { "mode": "single" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "displayName": "Rounds / CPU-core-hour"
            }
          },
          "targets": [
            {
              "expr": "sum(increase(round_created_total{job=\"frolf-bot\"}[$__rate_interval])) / (sum(rate(container_cpu_usage_seconds_total{namespace=\"frolf-bot\", container!=\"\", container!=\"POD\"}[$__rate_interval])) * 3600)",
              "legendFormat": "Rounds / CPU-core-hour",
              "refId": "A"
            }
          ]
        },
        {
          "id": 42,
          "type": "timeseries",
          "title": "Score Processing Events per CPU-Core-Hour",
          "description": "Score processing throughput per unit CPU — efficiency of the scoring pipeline",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 53 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "options": {
            "tooltip": { "mode": "single" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "displayName": "Score events / CPU-core-hour"
            }
          },
          "targets": [
            {
              "expr": "sum(increase(score_processing_attempts_total{job=\"frolf-bot\"}[$__rate_interval])) / (sum(rate(container_cpu_usage_seconds_total{namespace=\"frolf-bot\", container!=\"\", container!=\"POD\"}[$__rate_interval])) * 3600)",
              "legendFormat": "Score events / CPU-core-hour",
              "refId": "A"
            }
          ]
        }
      ]
    }
