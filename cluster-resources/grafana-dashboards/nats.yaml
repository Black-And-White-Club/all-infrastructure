apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-nats
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  nats.json: |
    {
      "id": null,
      "uid": "frolf-nats",
      "title": "NATS Server & JetStream",
      "description": "Private exporter health, server traffic, stream storage, and durable consumer lag",
      "tags": ["eventbus", "jetstream", "nats"],
      "timezone": "browser",
      "schemaVersion": 42,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "server", "label": "Server", "type": "query",
            "datasource": { "type": "prometheus", "uid": "mimir" },
            "query": { "query": "label_values(nats_varz_connections, server_id)", "refId": "server" },
            "includeAll": true, "allValue": ".*", "multi": true, "refresh": 2, "sort": 1
          },
          {
            "name": "stream", "label": "Stream", "type": "query",
            "datasource": { "type": "prometheus", "uid": "mimir" },
            "query": { "query": "label_values(nats_stream_total_messages{server_id=~\"$server\"}, stream_name)", "refId": "stream" },
            "includeAll": true, "allValue": ".*", "multi": true, "refresh": 2, "sort": 1
          },
          {
            "name": "consumer", "label": "Consumer", "type": "query",
            "datasource": { "type": "prometheus", "uid": "mimir" },
            "query": { "query": "label_values(nats_consumer_num_pending{server_id=~\"$server\",stream_name=~\"$stream\"}, consumer_name)", "refId": "consumer" },
            "includeAll": true, "allValue": ".*", "multi": true, "refresh": 2, "sort": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1, "title": "Connections", "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [{ "expr": "sum(nats_varz_connections{server_id=~\"$server\"})", "refId": "A" }]
        },
        {
          "id": 2, "title": "Message Throughput", "type": "timeseries",
          "gridPos": { "h": 8, "w": 18, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            { "expr": "sum by (server_id) (rate(nats_varz_in_msgs{server_id=~\"$server\"}[$__rate_interval]))", "legendFormat": "in {{server_id}}", "refId": "A" },
            { "expr": "sum by (server_id) (rate(nats_varz_out_msgs{server_id=~\"$server\"}[$__rate_interval]))", "legendFormat": "out {{server_id}}", "refId": "B" }
          ],
          "fieldConfig": { "defaults": { "unit": "mps" } }
        },
        {
          "id": 3, "title": "Stream Messages", "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [{
            "expr": "sum by (stream_name) (nats_stream_total_messages{server_id=~\"$server\",stream_name=~\"$stream\"})",
            "legendFormat": "{{stream_name}}", "refId": "A"
          }]
        },
        {
          "id": 4, "title": "Stream Storage", "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [{
            "expr": "sum by (stream_name) (nats_stream_total_bytes{server_id=~\"$server\",stream_name=~\"$stream\"})",
            "legendFormat": "{{stream_name}}", "refId": "A"
          }],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "id": 5, "title": "Consumer Pending", "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [{
            "expr": "sum by (stream_name, consumer_name) (nats_consumer_num_pending{server_id=~\"$server\",stream_name=~\"$stream\",consumer_name=~\"$consumer\"})",
            "legendFormat": "{{stream_name}} / {{consumer_name}}", "refId": "A"
          }]
        },
        {
          "id": 6, "title": "Acknowledgements Pending", "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [{
            "expr": "sum by (stream_name, consumer_name) (nats_consumer_num_ack_pending{server_id=~\"$server\",stream_name=~\"$stream\",consumer_name=~\"$consumer\"})",
            "legendFormat": "{{stream_name}} / {{consumer_name}}", "refId": "A"
          }]
        },
        {
          "id": 7, "title": "Redeliveries", "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [{
            "expr": "sum by (stream_name, consumer_name) (nats_consumer_num_redelivered{server_id=~\"$server\",stream_name=~\"$stream\",consumer_name=~\"$consumer\"})",
            "legendFormat": "{{stream_name}} / {{consumer_name}}", "refId": "A"
          }]
        }
      ]
    }
