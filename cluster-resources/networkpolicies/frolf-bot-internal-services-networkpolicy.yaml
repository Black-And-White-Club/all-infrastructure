apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frolf-bot-postgres-allow-backend
  namespace: frolf-bot
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  policyTypes:
    - Ingress
  ingress:
    # Allow both the long-running backend and the PreSync migration Job
    # (kustomize/frolf-backend/base/hooks/migration-job.yaml uses
    # `app: frolf-bot-backend-migrate`). Without the migrate label here the
    # Job is blocked under default-deny and PreSync hangs forever.
    # Also allow the daily backup CronJob pods (app: frolf-postgres-backup)
    # which run pg_dump and must reach Postgres on 5432.
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - frolf-bot-backend
                  - frolf-bot-backend-migrate
                  - frolf-postgres-backup
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frolf-bot-nats-allow-ingress
  namespace: frolf-bot
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nats
  policyTypes:
    - Ingress
  ingress:
    # Internal NATS client connections from backend and the PreSync
    # jetstream-ensure Job (kustomize/frolf-backend/base/hooks/jetstream-ensure-job.yaml
    # uses `app: frolf-backend-jetstream-ensure`). Without the ensure label here
    # the Job is blocked under default-deny and PreSync hangs forever.
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - frolf-bot-backend
                  - frolf-backend-jetstream-ensure
      ports:
        - protocol: TCP
          port: 4222
    # WebSocket connections proxied via ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 9222
