apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frolf-bot-postgres-allow-backend
  namespace: frolf-bot
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frolf-bot-backend
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frolf-bot-nats-allow-ingress
  namespace: frolf-bot
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nats
  policyTypes:
    - Ingress
  ingress:
    # Internal NATS client connections from backend
    - from:
        - podSelector:
            matchLabels:
              app: frolf-bot-backend
      ports:
        - protocol: TCP
          port: 4222
    # WebSocket connections proxied via ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 9222
