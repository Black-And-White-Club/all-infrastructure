apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frolf-bot-pwa-ingress
  namespace: frolf-bot
spec:
  podSelector:
    matchLabels:
      app: frolf-bot-pwa
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # Server-side requests to the backend API. SvelteKit SSR
    # (src/hooks.server.ts) calls `${backendUrl}/api/auth/ticket` to
    # rotate session tickets, and the /api/* SvelteKit proxy routes
    # forward requests from the browser to the backend over HTTP. This
    # is one of the narrow EDA exceptions — pre-session auth handshake
    # and SvelteKit SSR (see /Users/jace/Dev/CLAUDE.md).
    - to:
        - podSelector:
            matchLabels:
              app: frolf-bot-backend
      ports:
        - protocol: TCP
          port: 8080
    # OTLP HTTP traces/metrics/logs to Alloy
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: alloy
      ports:
        - protocol: TCP
          port: 4318
    # NOTE: No server-side NATS egress (TCP/4222) is required. The PWA
    # is purely client-side NATS — browsers open the NATS-WS connection
    # directly through the `frolf-nats-ingress` (kustomize/frolf-bot-pwa
    # /base/ingress-nats.yaml) and src/lib/server/ contains no NATS
    # client code. If SSR ever needs to publish NATS events, add an
    # egress rule here selecting `app.kubernetes.io/name: nats` on
    # TCP/4222.
