apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frolf-bot-backend-policy
  namespace: frolf-bot
spec:
  podSelector:
    matchLabels:
      app: frolf-bot-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # External traffic via ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    # Server-side requests from frolf-bot-pwa
    - from:
        - podSelector:
            matchLabels:
              app: frolf-bot-pwa
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # PostgreSQL (Bitnami Helm chart)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    # NATS internal client port
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: nats
      ports:
        - protocol: TCP
          port: 4222
    # OTLP gRPC (Alloy) and OTLP HTTP (Alloy) — METRICS_ADDRESS and TEMPO_ENDPOINT
    # point to alloy.observability.svc.cluster.local:4317
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: alloy
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    # Loki direct push — LOKI_URL points to loki.observability.svc.cluster.local:3100
    # (not through Alloy), so Loki needs its own egress rule
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: loki
      ports:
        - protocol: TCP
          port: 3100
    # SMTP egress for magic-link email delivery (no `to:` — allows any external provider)
    - ports:
        - port: 587
          protocol: TCP
        - port: 465
          protocol: TCP
