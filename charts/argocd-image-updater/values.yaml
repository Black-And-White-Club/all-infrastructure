crds:
  install: true
  keep: true

rbac:
  enabled: true

createClusterRoles: true

config:
  argocd.serverAddress: "argocd-server.argocd.svc.cluster.local"
  argocd.tokenSecretName: "argocd-image-updater-secret"
  git.user: "argocd-image-updater"
  git.email: "argocd-image-updater@noreply.com"
  log.level: "info"

  registries:
    - name: Oracle Cloud Infrastructure Registry
      api_url: https://us-ashburn-1.ocir.io
      prefix: us-ashburn-1.ocir.io
      ping: yes
      credentials: pullsecret:argocd/ocir-secret

revisionHistoryLimit: 3

resources:
  requests:
    cpu: 25m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

serviceAccount:
  create: true

extraArgs:
  - --leader-election=false

extraEnv:
  # Abort git push if throughput drops below 1KB/s for 30s (detects TCP stalls on OCI faster)
  - name: GIT_HTTP_LOW_SPEED_LIMIT
    value: "1000"
  - name: GIT_HTTP_LOW_SPEED_TIME
    value: "30"
