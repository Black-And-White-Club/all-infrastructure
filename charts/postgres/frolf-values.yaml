# Frolf-bot Postgres configuration
global:
  postgresql:
    auth:
      database: frolf_bot
      existingSecret: frolf-postgres-secret
      secretKeys:
        adminPasswordKey: postgres-password
        userPasswordKey: password

image:
  registry: docker.io
  repository: library/postgres
  tag: "17.4"

postgresqlDataDir: /var/lib/postgresql/data

primary:
  # Ensure frolf_bot database is created on fresh initdb (e.g., after OCI maintenance
  # causes a volume mount race). The official postgres image reads POSTGRES_DB; the
  # Bitnami chart's auth.database setting only works with the Bitnami image.
  extraEnvVars:
    - name: POSTGRES_DB
      value: frolf_bot
  nodeSelector:
    kubernetes.io/hostname: worker-1
  persistence:
    enabled: true
    storageClass: oci-block-storage
    size: 50Gi
    # Mount directly at PGDATA, not its parent. OCI's containerd runtime creates an
    # extra bind mount from the container image's /var/lib/postgresql/data layer,
    # shadowing the PVC's subdirectory and causing every restart to lose data.
    # Mounting at the exact PGDATA path eliminates the shadowing.
    mountPath: /var/lib/postgresql/data
    # Retain the OCI block volume even if the PVC is deleted (e.g., accidental
    # ArgoCD app deletion). Prevents silent data loss on cascade-delete.
    reclaimPolicy: Retain
  resources:
    requests:
      memory: 512Mi
      cpu: 25m
    limits:
      memory: 1Gi
      cpu: 500m
  containerSecurityContext:
    runAsUser: 999
    runAsGroup: 999
    runAsNonRoot: true
    readOnlyRootFilesystem: false
  podSecurityContext:
    fsGroup: 999
