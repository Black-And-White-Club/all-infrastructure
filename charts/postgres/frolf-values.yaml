# Frolf-bot Postgres configuration
global:
  postgresql:
    auth:
      database: frolf_bot
      existingSecret: frolf-postgres-secret
      secretKeys:
        adminPasswordKey: postgres-password
        userPasswordKey: password

image:
  registry: docker.io
  repository: library/postgres
  tag: "17.4"

# Use a non-default PGDATA path. OCI's containerd runtime shadow-bind-mounts paths
# that exist in the container image layer (/var/lib/postgresql/data is pre-created
# by library/postgres), which makes postgres write to ephemeral container storage
# instead of the PVC. /var/lib/postgresql/pgdata does not exist in the image, so
# no shadow mount is created and data persists across pod restarts.
postgresqlDataDir: /var/lib/postgresql/pgdata

primary:
  # Ensure frolf_bot database is created on fresh initdb (e.g., after OCI maintenance
  # causes a volume mount race). The official postgres image reads POSTGRES_DB; the
  # Bitnami chart's auth.database setting only works with the Bitnami image.
  extraEnvVars:
    - name: POSTGRES_DB
      value: frolf_bot
    - name: PGDATA
      value: /var/lib/postgresql/pgdata
  nodeSelector:
    kubernetes.io/hostname: worker-1
  persistence:
    enabled: true
    storageClass: oci-block-storage
    size: 50Gi
    mountPath: /var/lib/postgresql
    # Retain the OCI block volume even if the PVC is deleted (e.g., accidental
    # ArgoCD app deletion). Prevents silent data loss on cascade-delete.
    reclaimPolicy: Retain
  resources:
    requests:
      memory: 512Mi
      cpu: 25m
    limits:
      memory: 1Gi
      cpu: 500m
  containerSecurityContext:
    runAsUser: 999
    runAsGroup: 999
    runAsNonRoot: true
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
  podSecurityContext:
    fsGroup: 999
    seccompProfile:
      type: RuntimeDefault
