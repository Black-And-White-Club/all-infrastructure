# NATS Values for nats-io/nats chart
#
# Auth Callout is configured with:
# - Issuer public key for JWT validation
# - Credentials injected from nats-secrets SealedSecret
#
config:
  cluster:
    enabled: false
  jetstream:
    enabled: true
    fileStore:
      enabled: true
      dir: /data
      pvc:
        enabled: true
        size: 10Gi
        storageClassName: "oci-block-storage"
  nats:
    port: 4222
  websocket:
    enabled: true
    port: 9222

  merge:
    accounts:
      ACFZCYMXEOZSYNMEEGHGDOGN4PFYWLZEHIGHBBYPMQ3UFH4PZJ44QIAP:
        jetstream: enabled
        users:
          - user: "auth-service"
            password: "<< $NATS_AUTH_SERVICE_PASSWORD >>"
      SYS:
        users:
          - user: "sys"
            password: "<< $NATS_SYS_PASSWORD >>"

    system_account: SYS

    authorization:
      # discord-bot connects via auth-callout — its NATS_URL secret
      # (discord-secrets in all-infrastructure-secrets/) must carry a
      # token/NKey credential the callout handler issues. The static
      # password entry under accounts.users was removed in commit bf40dad
      # ("fix: SMTP config, ArgoCD finalizers, NATS auth bypass, ..."),
      # so any non-callout discord login path is dead. If the bot fails
      # to connect after this change, verify the discord-secrets
      # NATS_URL credential is callout-compatible before re-adding a
      # static user — re-adding the static user would silently bypass
      # the callout authorization.
      auth_callout:
        account: ACFZCYMXEOZSYNMEEGHGDOGN4PFYWLZEHIGHBBYPMQ3UFH4PZJ44QIAP
        issuer: "ACFZCYMXEOZSYNMEEGHGDOGN4PFYWLZEHIGHBBYPMQ3UFH4PZJ44QIAP"
        auth_users:
          - "auth-service"
          - "discord-bot"

natsBox:
  enabled: false

# Resource limits for the NATS pod
container:
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  env:
    NATS_AUTH_SERVICE_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: nats-secrets
          key: NATS_AUTH_SERVICE_PASSWORD
    NATS_SYS_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: nats-secrets
          key: NATS_SYS_PASSWORD

service:
  type: ClusterIP
  ports:
    websocket:
      port: 9222
      name: websocket

ingress:
  # Disabled: the NATS WebSocket Ingress is owned by the kustomize-managed
  # PWA app at kustomize/frolf-bot-pwa/base/ingress-nats.yaml (single source
  # of truth). Keeping the rest of this block as reference/docs only.
  enabled: false
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: frolf-bot.duckdns.org
      paths:
        - /nats
  tls:
    - secretName: frolf-bot-pwa-tls
      hosts:
        - frolf-bot.duckdns.org
