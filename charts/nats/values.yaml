# NATS Values for nats-io/nats chart
#
# Auth Callout is configured with:
# - Issuer public key for JWT validation
# - Credentials injected from nats-secrets SealedSecret
#
config:
  cluster:
    enabled: false
  jetstream:
    enabled: true
    fileStore:
      enabled: true
      dir: /data
      pvc:
        enabled: true
        # NOTE: the live PVC (frolf-nats-js-frolf-nats-0) was manually expanded
        # to 50Gi. This value only applies at PVC creation, and the StatefulSet's
        # volumeClaimTemplates field is immutable — do NOT bump it to 50Gi, that
        # would wedge the ArgoCD sync. Kept at 10Gi to match the live STS spec.
        size: 10Gi
        storageClassName: "oci-block-storage"
  nats:
    port: 4222
  websocket:
    enabled: true
    port: 9222

  merge:
    accounts:
      ACFZCYMXEOZSYNMEEGHGDOGN4PFYWLZEHIGHBBYPMQ3UFH4PZJ44QIAP:
        jetstream: enabled
        users:
          - user: "auth-service"
            password: "<< $NATS_AUTH_SERVICE_PASSWORD >>"
          - user: "discord-bot"
            password: "<< $NATS_DISCORD_BOT_PASSWORD >>"
          - user: "ops-console"
            password: "<< $NATS_OPS_CONSOLE_PASSWORD >>"
      SYS:
        users:
          - user: "sys"
            password: "<< $NATS_SYS_PASSWORD >>"

    system_account: SYS

    authorization:
      auth_callout:
        account: ACFZCYMXEOZSYNMEEGHGDOGN4PFYWLZEHIGHBBYPMQ3UFH4PZJ44QIAP
        issuer: "ACFZCYMXEOZSYNMEEGHGDOGN4PFYWLZEHIGHBBYPMQ3UFH4PZJ44QIAP"
        # auth_users bypass the callout and authenticate statically against
        # accounts.users above. discord-bot uses static password auth (it has
        # no JWT to present), so it MUST be listed here — otherwise NATS
        # routes it through the callout, the backend auth-service tries to
        # parse the password as a JWT, and rejects it as malformed.
        auth_users:
          - "auth-service"
          - "discord-bot"
          - "ops-console"

natsBox:
  enabled: false

# Bundled sidecar exporter; keep collection deliberately narrow. The chart's
# defaults include connz/subz/routez, so replace the entire args list rather
# than inheriting those high-cardinality endpoints.
promExporter:
  enabled: true
  image:
    tag: 0.19.2
  merge:
    args:
      - -port=7777
      - -healthz
      - -varz
      - -jsz=all
      - -prefix=nats
      - -use_internal_server_id
      - http://localhost:8222/
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        # Rendering /metrics (~2.3MB with -jsz=all) costs ~150ms CPU per scrape;
        # at 100m the CFS quota stretched that past the probes' 1s timeout
        # (65% of periods throttled), so liveness kill-looped the container and
        # the NotReady pod dropped NATS out of its Service endpoints (PWA 503).
        cpu: 500m
        memory: 128Mi
    # tcpSocket, NOT httpGet /metrics: every /metrics request triggers a full
    # varz+jsz scrape and a ~2.3MB render, so probing it couples pod (and thus
    # NATS Service) health to render latency — under CPU throttle that took
    # down NATS for the whole PWA. The exporter serves no other HTTP path
    # (/healthz is a scrape-selector flag, not an endpoint; verified 404), so
    # a listener-alive TCP check is the only render-independent probe.
    readinessProbe:
      tcpSocket:
        port: prom-metrics
      initialDelaySeconds: 5
      periodSeconds: 10
    livenessProbe:
      tcpSocket:
        port: prom-metrics
      initialDelaySeconds: 10
      periodSeconds: 30
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      # Image has no USER directive (defaults to root) — runAsNonRoot alone
      # makes kubelet refuse to start the container (CreateContainerConfigError).
      # 1000 matches the convention used for other app images with no built-in
      # non-root user (frolf-backend/frolf-discord/frolf-bot-pwa deployments).
      # runAsGroup pins the primary GID too, so it doesn't default to root (0).
      runAsUser: 1000
      runAsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
          - ALL

# NOTE (render-verified 2026-06-11): nats chart 2.14.0 SILENTLY IGNORES top-level
# `podSecurityContext:`, `container.securityContext:`, and `nodeSelector:` keys —
# helm template output is byte-identical with or without them. The NATS pod
# currently runs with NO securityContext (image default user) and NO node pinning.
# Do NOT re-add those keys here. The chart-correct locations are
# `podTemplate.merge.spec.securityContext` / `.spec.nodeSelector` and
# `container.merge.securityContext` — but applying them changes the pod identity
# over the live JetStream PVC (data-loss-adjacent) and applies an untested node
# label, so they are deliberately deferred to the owner-run maintenance procedure
# in all-infrastructure/docs/SCALE_PLAYBOOK.md "PSS enforce graduation (NATS)".

# Intended-but-NOT-applied: pin NATS to the worker holding its RWO OCI block
# volume. Single-worker cluster today, so placement is unaffected; apply via
# podTemplate.merge.spec.nodeSelector after verifying the real node label
# (kubectl get nodes --show-labels) during the graduation procedure.

# Resource limits for the NATS pod
container:
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  env:
    NATS_AUTH_SERVICE_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: nats-secrets
          key: NATS_AUTH_SERVICE_PASSWORD
    NATS_SYS_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: nats-secrets
          key: NATS_SYS_PASSWORD
    NATS_DISCORD_BOT_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: nats-secrets
          key: NATS_DISCORD_BOT_PASSWORD
    NATS_OPS_CONSOLE_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: nats-secrets
          key: NATS_OPS_CONSOLE_PASSWORD

service:
  type: ClusterIP
  ports:
    websocket:
      port: 9222
      name: websocket

ingress:
  # Disabled: the NATS WebSocket Ingress is owned by the kustomize-managed
  # PWA app at kustomize/frolf-bot-pwa/base/ingress-nats.yaml (single source
  # of truth). Keeping the rest of this block as reference/docs only.
  enabled: false
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: aceflight.app
      paths:
        - /nats
  tls:
    - secretName: frolf-bot-pwa-tls
      hosts:
        - aceflight.app
