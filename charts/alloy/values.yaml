# Alloy - OTEL-first telemetry collector
# Apps emit logs/metrics/traces via OTLP only
# Infrastructure metrics scraped via Prometheus (kube-state-metrics, node-exporter)

alloy:
  # NOTE: the grafana/alloy chart reads container resources from alloy.resources;
  # a resources block under controller: is silently ignored.
  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  configMap:
    content: |
      logging {
        level  = "info"
        format = "json"
      }

      /////////////////////////////////////////
      // OTLP RECEIVERS - INTERNAL AND BROWSER SIGNALS
      /////////////////////////////////////////

      // Internal workloads are associated with their source Pod before any
      // resource attributes are promoted to metric or log labels.
      otelcol.receiver.otlp "internal" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }
        http {
          endpoint = "0.0.0.0:4318"
        }
        output {
          logs    = [otelcol.processor.k8sattributes.internal.input]
          metrics = [otelcol.processor.k8sattributes.internal.input]
          traces  = [otelcol.processor.k8sattributes.internal.input]
        }
      }

      // Browser OTLP stays on the public /v1 path but uses a dedicated port.
      // It deliberately bypasses k8sattributes: the source connection is the
      // ingress controller, not the end user's browser.
      otelcol.receiver.otlp "browser" {
        http {
          endpoint = "0.0.0.0:4319"
        }
        output {
          logs    = [otelcol.processor.transform.browser.input]
          metrics = [otelcol.processor.transform.browser.input]
          traces  = [otelcol.processor.transform.browser.input]
        }
      }

      /////////////////////////////////////////
      // INTERNAL KUBERNETES RESOURCE ENRICHMENT
      /////////////////////////////////////////

      otelcol.processor.k8sattributes "internal" {
        extract {
          metadata = [
            "k8s.namespace.name",
            "k8s.deployment.name",
            "k8s.statefulset.name",
            "k8s.pod.name",
            "k8s.pod.uid",
            "k8s.node.name",
          ]
        }

        pod_association {
          source {
            from = "resource_attribute"
            name = "k8s.pod.uid"
          }
        }
        pod_association {
          source {
            from = "connection"
          }
        }

        output {
          logs    = [otelcol.processor.transform.internal.input]
          metrics = [otelcol.processor.transform.internal.input]
          traces  = [otelcol.processor.transform.internal.input]
        }
      }

      /////////////////////////////////////////
      // TRANSFORMS - CURATED RESOURCE DIMENSIONS
      /////////////////////////////////////////

      otelcol.processor.transform "internal" {
        error_mode = "ignore"

        log_statements {
          context = "resource"
          statements = [
            "set(attributes[\"k8s.cluster.name\"], \"production\")",
            "set(attributes[\"service.instance.id\"], attributes[\"k8s.pod.uid\"])",
            "set(attributes[\"k8s.workload.name\"], attributes[\"k8s.deployment.name\"]) where attributes[\"k8s.deployment.name\"] != nil",
            "set(attributes[\"k8s.workload.name\"], attributes[\"k8s.statefulset.name\"]) where attributes[\"k8s.workload.name\"] == nil and attributes[\"k8s.statefulset.name\"] != nil",
            "set(attributes[\"deployment.environment.name\"], attributes[\"deployment.environment\"]) where attributes[\"deployment.environment.name\"] == nil and attributes[\"deployment.environment\"] != nil",
            "set(attributes[\"environment\"], attributes[\"deployment.environment.name\"])",
            "set(attributes[\"namespace\"], attributes[\"k8s.namespace.name\"])",
            "set(attributes[\"workload\"], attributes[\"k8s.workload.name\"])",
            "set(attributes[\"pod\"], attributes[\"k8s.pod.name\"])",
          ]
        }

        metric_statements {
          context = "resource"
          statements = [
            "set(attributes[\"k8s.cluster.name\"], \"production\")",
            "set(attributes[\"service.instance.id\"], attributes[\"k8s.pod.uid\"])",
            "set(attributes[\"k8s.workload.name\"], attributes[\"k8s.deployment.name\"]) where attributes[\"k8s.deployment.name\"] != nil",
            "set(attributes[\"k8s.workload.name\"], attributes[\"k8s.statefulset.name\"]) where attributes[\"k8s.workload.name\"] == nil and attributes[\"k8s.statefulset.name\"] != nil",
            "set(attributes[\"deployment.environment.name\"], attributes[\"deployment.environment\"]) where attributes[\"deployment.environment.name\"] == nil and attributes[\"deployment.environment\"] != nil",
          ]
        }

        metric_statements {
          context = "datapoint"
          statements = [
            "set(attributes[\"environment\"], resource.attributes[\"deployment.environment.name\"])",
            "set(attributes[\"namespace\"], resource.attributes[\"k8s.namespace.name\"])",
            "set(attributes[\"workload\"], resource.attributes[\"k8s.workload.name\"])",
            "set(attributes[\"pod\"], resource.attributes[\"k8s.pod.name\"])",
            "set(attributes[\"app_surface\"], resource.attributes[\"app.surface\"])",
          ]
        }

        trace_statements {
          context = "resource"
          statements = [
            "set(attributes[\"k8s.cluster.name\"], \"production\")",
            "set(attributes[\"service.instance.id\"], attributes[\"k8s.pod.uid\"])",
            "set(attributes[\"k8s.workload.name\"], attributes[\"k8s.deployment.name\"]) where attributes[\"k8s.deployment.name\"] != nil",
            "set(attributes[\"k8s.workload.name\"], attributes[\"k8s.statefulset.name\"]) where attributes[\"k8s.workload.name\"] == nil and attributes[\"k8s.statefulset.name\"] != nil",
            "set(attributes[\"deployment.environment.name\"], attributes[\"deployment.environment\"]) where attributes[\"deployment.environment.name\"] == nil and attributes[\"deployment.environment\"] != nil",
          ]
        }

        output {
          logs    = [otelcol.processor.attributes.logs.input]
          metrics = [otelcol.processor.batch.default.input]
          traces  = [otelcol.processor.batch.default.input]
        }
      }

      otelcol.processor.transform "browser" {
        error_mode = "ignore"

        log_statements {
          context = "resource"
          statements = [
            "set(attributes[\"k8s.cluster.name\"], \"production\")",
            "set(attributes[\"deployment.environment.name\"], attributes[\"deployment.environment\"]) where attributes[\"deployment.environment.name\"] == nil and attributes[\"deployment.environment\"] != nil",
            "set(attributes[\"environment\"], attributes[\"deployment.environment.name\"])",
          ]
        }
        metric_statements {
          context = "datapoint"
          statements = [
            "set(attributes[\"environment\"], resource.attributes[\"deployment.environment.name\"])",
            "set(attributes[\"app_surface\"], resource.attributes[\"app.surface\"])",
          ]
        }
        trace_statements {
          context = "resource"
          statements = [
            "set(attributes[\"k8s.cluster.name\"], \"production\")",
            "set(attributes[\"deployment.environment.name\"], attributes[\"deployment.environment\"]) where attributes[\"deployment.environment.name\"] == nil and attributes[\"deployment.environment\"] != nil",
          ]
        }

        output {
          logs    = [otelcol.processor.attributes.logs.input]
          metrics = [otelcol.processor.batch.default.input]
          traces  = [otelcol.processor.batch.default.input]
        }
      }

      /////////////////////////////////////////
      // ATTRIBUTES PROCESSOR - LOG LABEL HINTS
      /////////////////////////////////////////

      otelcol.processor.attributes "logs" {
        action {
          key    = "loki.resource.labels"
          action = "insert"
          value  = "service.name,environment,namespace,workload,pod,app.surface"
        }
        action {
          key    = "loki.attribute.labels"
          action = "insert"
          value  = "level"
        }
        output {
          logs = [otelcol.processor.batch.logs.input]
        }
      }

      /////////////////////////////////////////
      // BATCH PROCESSORS
      /////////////////////////////////////////

      otelcol.processor.batch "default" {
        timeout              = "5s"
        send_batch_size      = 4096
        send_batch_max_size  = 8192
        output {
          traces  = [otelcol.exporter.otlp.tempo.input]
          metrics = [otelcol.exporter.prometheus.mimir.input]
        }
      }

      otelcol.processor.batch "logs" {
        timeout              = "5s"
        send_batch_size      = 4096
        send_batch_max_size  = 8192
        output {
          logs = [otelcol.exporter.loki.default.input]
        }
      }

      /////////////////////////////////////////
      // EXPORTERS
      /////////////////////////////////////////

      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo-distributor.observability.svc.cluster.local:4317"
          tls {
            insecure = true
          }
        }
      }

      otelcol.exporter.loki "default" {
        forward_to = [loki.write.default.receiver]
      }

      otelcol.exporter.prometheus "mimir" {
        forward_to = [prometheus.remote_write.mimir.receiver]
      }

      /////////////////////////////////////////
      // BACKEND WRITERS
      /////////////////////////////////////////

      loki.write "default" {
        endpoint {
          url = "http://loki-gateway.observability.svc.cluster.local/loki/api/v1/push"
        }
      }

      prometheus.remote_write "mimir" {
        endpoint {
          url = "http://mimir-gateway.observability.svc.cluster.local/api/v1/push"
        }
        external_labels = {
          cluster    = "production",
          prometheus = "alloy",
        }
      }

      /////////////////////////////////////////
      // INFRASTRUCTURE METRICS (NON-OTLP)
      /////////////////////////////////////////

      discovery.kubernetes "services" {
        role = "service"
      }

      discovery.kubernetes "endpoints" {
        role = "endpoints"
      }

      discovery.kubernetes "pods" {
        role = "pod"
      }

      // NATS exporter sidecar. Discovery is restricted to its private Pod
      // port, so no monitoring endpoint is exposed outside the cluster.
      prometheus.scrape "nats" {
        targets         = discovery.relabel.nats_exporter.output
        scrape_interval = "30s"
        job_name        = "nats"
        forward_to      = [prometheus.relabel.nats.receiver]
      }

      // The exporter applies -prefix only to core metrics. Normalize its
      // JetStream families too so dashboards use one stable nats_* namespace.
      prometheus.relabel "nats" {
        forward_to = [prometheus.remote_write.mimir.receiver]
        rule {
          source_labels = ["__name__"]
          regex         = "jetstream_stream_(.*)"
          replacement   = "nats_stream_$1"
          target_label  = "__name__"
        }
        rule {
          source_labels = ["__name__"]
          regex         = "jetstream_consumer_(.*)"
          replacement   = "nats_consumer_$1"
          target_label  = "__name__"
        }
        rule {
          source_labels = ["__name__"]
          regex         = "jetstream_server_(.*)"
          replacement   = "nats_server_$1"
          target_label  = "__name__"
        }
      }

      discovery.relabel "nats_exporter" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          regex         = "frolf-bot"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          regex         = "prom-exporter"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_port_number"]
          regex         = "7777"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
      }

      // kube-state-metrics
      prometheus.scrape "kube_state_metrics" {
        targets         = discovery.relabel.kube_state_metrics.output
        scrape_interval = "30s"
        job_name        = "kube-state-metrics"
        forward_to      = [prometheus.remote_write.mimir.receiver]
      }

      discovery.relabel "kube_state_metrics" {
        targets = discovery.kubernetes.services.targets
        rule {
          source_labels = ["__meta_kubernetes_service_name"]
          regex         = "kube-state-metrics"
          action        = "keep"
        }
        // Do NOT relabel __meta_kubernetes_namespace to "namespace" here.
        // kube-state-metrics emits its own "namespace" label on every metric
        // (e.g. namespace="frolf-bot" for pods in that namespace). Adding a
        // scrape-level namespace=kube-system label would cause Prometheus to
        // rename the metric label to "exported_namespace", breaking standard
        // queries like kube_pod_container_resource_requests{namespace="frolf-bot"}.
      }

      // node-exporter
      prometheus.scrape "node_exporter" {
        targets         = discovery.relabel.node_exporter.output
        scrape_interval = "30s"
        job_name        = "node-exporter"
        forward_to      = [prometheus.remote_write.mimir.receiver]
      }

      discovery.relabel "node_exporter" {
        targets = discovery.kubernetes.endpoints.targets
        rule {
          source_labels = ["__meta_kubernetes_service_name"]
          regex         = "node-exporter.*"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }
      }

      // ingress-nginx controller metrics
      prometheus.scrape "nginx_ingress" {
        targets         = discovery.relabel.nginx_ingress.output
        scrape_interval = "30s"
        job_name        = "nginx-ingress"
        forward_to      = [prometheus.remote_write.mimir.receiver]
      }

      discovery.relabel "nginx_ingress" {
        targets = discovery.kubernetes.endpoints.targets
        rule {
          source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_service_name"]
          regex         = "ingress-nginx;(nginx-ingress-controller|nginx-ingress-controller-metrics)"
          separator     = ";"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_endpoint_port_name"]
          regex         = "metrics|prometheus"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_service_name"]
          target_label  = "service"
        }
      }

      // cert-manager metrics (:9402/metrics) — required for cert-expiry alert rules
      // in cluster-resources/grafana-alerts/grafana-alert-rules.yaml which use
      // certmanager_certificate_expiration_timestamp_seconds.
      prometheus.scrape "cert_manager" {
        targets         = discovery.relabel.cert_manager.output
        scrape_interval = "60s"
        job_name        = "cert-manager"
        forward_to      = [prometheus.remote_write.mimir.receiver]
      }

      discovery.relabel "cert_manager" {
        targets = discovery.kubernetes.endpoints.targets
        rule {
          source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_service_name"]
          regex         = "cert-manager;cert-manager"
          separator     = ";"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_endpoint_port_name"]
          regex         = "metrics|http-metrics|tcp-prometheus-servicemonitor"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_service_name"]
          target_label  = "service"
        }
      }

      // kubelet and cadvisor
      discovery.kubernetes "nodes" {
        role = "node"
      }

      discovery.relabel "nodes" {
        targets = discovery.kubernetes.nodes.targets
        rule {
          source_labels = ["__meta_kubernetes_node_name"]
          target_label  = "node"
        }
      }

      prometheus.scrape "kubelet" {
        targets           = discovery.relabel.nodes.output
        scheme            = "https"
        metrics_path      = "/metrics"
        scrape_interval   = "30s"
        job_name          = "kubelet"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          insecure_skip_verify = true
        }
        forward_to        = [prometheus.remote_write.mimir.receiver]
      }

      prometheus.scrape "cadvisor" {
        targets           = discovery.relabel.nodes.output
        scheme            = "https"
        metrics_path      = "/metrics/cadvisor"
        scrape_interval   = "30s"
        job_name          = "cadvisor"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          insecure_skip_verify = true
        }
        forward_to        = [prometheus.remote_write.mimir.receiver]
      }

  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
    - name: otlp-http-web
      port: 4319
      targetPort: 4319
      protocol: TCP
    # Alloy's internal HTTP/UI server listens on 12345 by default. Align
    # service port and targetPort — no consumer in this repo references
    # 12347 (verified via repo-wide grep).
    - name: internal-http
      port: 12345
      targetPort: 12345
      protocol: TCP

serviceAccount:
  create: true
  name: alloy

rbac:
  create: true

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://aceflight.app"
    nginx.ingress.kubernetes.io/cors-allow-methods: "POST, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, traceparent, tracestate"
  hosts:
    - aceflight.app
  # The chart always renders a main `path` block from `path` + `faroPort`
  # (see templates/ingress.yaml). Override both so it points at the OTLP
  # HTTP receiver on the existing `/v1` prefix instead of the chart default
  # (`/` → port 12347, which doesn't exist on this svc and previously
  # produced `503 Service Unavailable` on `/v1/traces` for browser OTLP
  # exports). `extraPaths` removed because the main path now covers it.
  path: /v1
  pathType: Prefix
  faroPort: 4319
  # TLS is owned by kustomize/frolf-bot-pwa/base/ingress.yaml — all four
  # ingresses share the host `aceflight.app`, and cert-manager
  # only needs one source of truth for the `frolf-bot-pwa-tls` secret.
  tls: []

controller:
  type: deployment
  replicas: 1
  revisionHistoryLimit: 3
