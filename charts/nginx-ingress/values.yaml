controller:
  # Workloads belong on worker nodes, not the control plane. The control-plane
  # node has its NoSchedule taint removed so platform pods (csi-oci-controller,
  # metrics-server, etc.) can fit on the small Always-Free footprint, which
  # means the scheduler is free to place nginx-ingress on either node. The OCI
  # LB resume-ingress's backend-set targets worker-1's private IP (see
  # terraform/main.tf:256 — `backend_ip_addresses = [module.compute.private_ips[1]]`),
  # so when nginx-ingress lands on control-plane the LB has no healthy backend
  # and every external TLS handshake RSTs. This affinity forces it onto a
  # non-control-plane node.
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
  revisionHistoryLimit: 3
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet
  # On a 2-node hostNetwork cluster, surge rollouts deadlock because the new pod
  # cannot bind 80/443 while the old pod is still holding those ports.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  service:
    type: ClusterIP
  resources:
    requests:
      # Worker-1 runs the full app + observability stack and sits at ~97% CPU
      # requests. nginx-ingress is mostly idle (a few req/s), so a 25m request
      # is plenty; the limit stays at 200m for traffic spikes.
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  metrics:
    enabled: true
  config:
    resolver: "coredns.kube-system.svc.cluster.local. valid=30s"
    # Real client IP recovery behind Cloudflare -> OCI LB (TCP passthrough on
    # 443) -> nginx. The LB proxies, so the TCP peer is always the LB's address
    # in the node subnet; the true client IP only exists in CF-Connecting-IP,
    # which Cloudflare overwrites on every proxied request (unforgeable by
    # clients, unlike append-only X-Forwarded-For). Origin lockdown (terraform
    # cloudflare_ipv4_cidrs) means only CF + the admin IP can reach the LB at
    # all. Non-CF hostnames (grafana, resume) lack the header and keep seeing
    # the LB address — unchanged behavior. use-forwarded-headers stays false so
    # incoming X-Forwarded-* junk is ignored; nginx rebuilds clean X-Real-IP /
    # X-Forwarded-For for upstreams from the recovered address. Downstream
    # consumers: PWA ADDRESS_HEADER=X-Real-IP (kustomize/frolf-bot-pwa) and
    # backend TRUSTED_PROXY_CIDRS (backend-secrets).
    enable-real-ip: "true"
    forwarded-for-header: "CF-Connecting-IP"
    proxy-real-ip-cidr: "10.0.1.0/24"
